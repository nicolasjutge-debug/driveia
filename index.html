<style>
:root{--bg:#0D1117;--sf:#161B25;--bd:#1E2535;--yl:#FFD600;--or:#FF6B00;--gn:#4CAF50;--bl:#2196F3;--tx:#FFF;--mu:#8B95A1;--dm:#2A3040;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,20px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:calc(80px + var(--sb))}
.screen::-webkit-scrollbar{display:none}
.safe-top{padding-top:calc(var(--st) + 12px)}
.tabbar{flex-shrink:0;background:rgba(13,17,23,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;padding-bottom:var(--sb);padding-top:10px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0}
.tab-icon{font-size:22px;line-height:1}
.tab-label{font-size:10px;font-weight:600;color:#444}
.tab.active .tab-label{color:var(--yl)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:20px}
input,select,textarea{background:var(--sf);border:1px solid var(--bd);border-radius:14px;color:var(--tx);font-size:15px;font-weight:600;padding:13px 16px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none}
input::placeholder{color:var(--mu);font-weight:400}
.btn{padding:16px;border-radius:16px;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;width:100%;transition:opacity .15s}
.btn-y{background:var(--yl);color:#000}
.btn-y:disabled{background:var(--dm);color:#555}
.btn-s{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.btn-b{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}
.btn-g{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.4);color:var(--gn)}
.diff{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;letter-spacing:.5px}
.de{background:rgba(76,175,80,.15);color:#4CAF50}
.dm{background:rgba(255,214,0,.15);color:#FFD600}
.dh{background:rgba(255,107,0,.15);color:#FF6B00}
.prog-t{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--yl),var(--or));transition:width 1.2s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.15);border-top-color:var(--yl);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes drawRoute{to{stroke-dashoffset:0}}
.route-anim{stroke-dasharray:600;stroke-dashoffset:600;animation:drawRoute 2.2s ease forwards .4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease forwards}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse 1.4s infinite}
.chip{padding:7px 13px;border-radius:10px;border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;background:var(--dm);color:var(--mu);transition:all .15s}
.chip.on{background:var(--yl);border-color:var(--yl);color:#000}
/* Modal */
.modal-wrap{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-wrap.open{display:flex}
.modal-bd{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-sh{position:relative;z-index:1;width:100%;max-width:480px;background:#161B25;border-radius:28px 28px 0 0;border-top:1px solid var(--bd);padding:0 20px calc(var(--sb) + 20px);animation:slideUp .35s cubic-bezier(.34,1.2,.64,1);max-height:90vh;overflow-y:auto}
.modal-sh::-webkit-scrollbar{display:none}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--dm);margin:12px auto 20px}
/* FAB */
.fab{position:fixed;bottom:calc(90px + var(--sb) + 14px);right:18px;width:56px;height:56px;border-radius:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;flex-direction:column;gap:2px;transition:transform .15s}
.fab:active{transform:scale(.91)}
/* Profile avatar */
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#000;flex-shrink:0}
/* Toast */
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#1E2535;color:white;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1}
/* Row helpers */
.row{display:flex;gap:10px}
.row>*{flex:1}
.sect{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:12px}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
/* Profile selector bar */
.prof-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.prof-bar::-webkit-scrollbar{display:none}
.prof-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.prof-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;border:2.5px solid transparent;transition:all .2s}
.prof-av.active{border-color:var(--yl)}
.prof-name{font-size:10px;font-weight:600;color:var(--mu);max-width:50px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prof-name.active{color:var(--yl)}
.add-prof{width:46px;height:46px;border-radius:50%;background:var(--dm);border:2px dashed var(--bd);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;color:var(--mu)}
</style>
</head>
<body>
<div id="app">
  <div id="s-home"  class="screen safe-top"></div>
  <div id="s-stats" class="screen safe-top" style="display:none"></div>
  <div id="s-gen"   class="screen safe-top" style="display:none"></div>
  <div id="s-profils" class="screen safe-top" style="display:none"></div>
  <nav class="tabbar">
    <button class="tab active" onclick="go('home')" id="t-home"><span class="tab-icon">🏠</span><span class="tab-label">Accueil</span></button>
    <button class="tab" onclick="go('stats')" id="t-stats"><span class="tab-icon">📊</span><span class="tab-label">Km & Stats</span></button>
    <button class="tab" onclick="go('gen')" id="t-gen"><span class="tab-icon">🧠</span><span class="tab-label">IA</span></button>
    <button class="tab" onclick="go('profils')" id="t-profils"><span class="tab-icon">👥</span><span class="tab-label">Profils</span></button>
  </nav>
</div>

<!-- FAB Coach AAC -->
<button class="fab" onclick="openLecon()" style="background:linear-gradient(135deg,#00A651,#007A3D);box-shadow:0 8px 24px rgba(0,166,81,.4)">
  <span style="font-size:20px">🚗</span><span style="font-size:9px;font-weight:800;color:#fff">AAC</span>
</button>

<!-- MODAL: Saisie leçon -->
<div class="modal-wrap" id="m-lecon">
  <div class="modal-bd" onclick="closeModal('m-lecon')"></div>
  <div class="modal-sh">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#00A651,#007A3D);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🚗</div>
      <div>
        <div style="font-size:19px;font-weight:900;color:#fff">Leçon terminée</div>
        <div id="lecon-who" style="font-size:12px;color:var(--mu)">Coach AAC · saisie rapide</div>
      </div>
    </div>
    <div style="padding:16px;background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.2);border-radius:18px;margin-bottom:14px">
      <div class="lbl">Km compteur après la leçon</div>
      <input type="number" id="l-km" placeholder="ex: 12 683" inputmode="numeric" oninput="updateDelta()" style="background:none;border:none;border-bottom:2px solid var(--yl);border-radius:0;font-size:32px;font-weight:900;padding:8px 0">
      <div id="l-delta" style="font-size:12px;color:var(--gn);margin-top:6px;min-height:16px"></div>
    </div>
    <div class="row" style="margin-bottom:14px">
      <div><div class="lbl">Date</div><input type="date" id="l-date" style="font-size:14px;padding:12px"></div>
      <div><div class="lbl">Durée</div><input type="text" id="l-dur" placeholder="1h30" style="font-size:14px;padding:12px"></div>
    </div>
    <div class="lbl">Accompagnateur</div>
    <select id="l-acc" style="margin-bottom:14px;font-size:14px;padding:12px"></select>
    <div class="lbl">Type de leçon</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="l-chips">
      <button class="chip on" onclick="this.classList.toggle('on')">🏙️ Ville</button>
      <button class="chip" onclick="this.classList.toggle('on')">🛣️ Route</button>
      <button class="chip" onclick="this.classList.toggle('on')">🅿️ Parking</button>
      <button class="chip" onclick="this.classList.toggle('on')">🔄 Ronds-pts</button>
      <button class="chip" onclick="this.classList.toggle('on')">🌙 Nuit</button>
      <button class="chip" onclick="this.classList.toggle('on')">🌧️ Pluie</button>
    </div>
    <div class="lbl">Note</div>
    <input type="text" id="l-note" placeholder="Ex: créneaux réussis…" style="margin-bottom:16px;font-weight:400">
    <button class="btn btn-y" onclick="saveLecon()">✅ Enregistrer la leçon</button>
    <div id="l-hist" style="margin-top:20px"></div>
  </div>
</div>

<!-- MODAL: Navigation -->
<div class="modal-wrap" id="m-nav">
  <div class="modal-bd" onclick="closeModal('m-nav')"></div>
  <div class="modal-sh" id="m-nav-content"></div>
</div>

<!-- MODAL: Ajouter profil -->
<div class="modal-wrap" id="m-profil">
  <div class="modal-bd" onclick="closeModal('m-profil')"></div>
  <div class="modal-sh">
    <div class="modal-handle"></div>
    <div style="font-size:19px;font-weight:900;color:#fff;margin-bottom:4px" id="mp-title">Nouveau profil</div>
    <div style="font-size:12px;color:var(--mu);margin-bottom:20px" id="mp-sub">Conducteur ou accompagnateur</div>
    <div class="lbl">Prénom</div>
    <input type="text" id="mp-name" placeholder="Ex: Lucas" style="margin-bottom:14px">
    <div class="lbl">Rôle</div>
    <div style="display:flex;gap:8px;margin-bottom:14px" id="mp-role-btns">
      <button onclick="setRole('conducteur')" id="r-cond" class="btn btn-y" style="font-size:13px;padding:12px">🚗 Conducteur</button>
      <button onclick="setRole('accompagnateur')" id="r-acc" class="btn btn-s" style="font-size:13px;padding:12px">👤 Accompagnateur</button>
    </div>
    <div class="lbl">Couleur / Emoji</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px" id="mp-colors">
      <div class="avatar" style="background:#FFD600;cursor:pointer;border:3px solid transparent" onclick="selectColor('#FFD600','🚗')">🚗</div>
      <div class="avatar" style="background:#FF6B00;cursor:pointer;border:3px solid transparent" onclick="selectColor('#FF6B00','🔥')">🔥</div>
      <div class="avatar" style="background:#4CAF50;cursor:pointer;border:3px solid transparent" onclick="selectColor('#4CAF50','🌿')">🌿</div>
      <div class="avatar" style="background:#2196F3;cursor:pointer;border:3px solid transparent" onclick="selectColor('#2196F3','💙')">💙</div>
      <div class="avatar" style="background:#9C27B0;cursor:pointer;border:3px solid transparent" onclick="selectColor('#9C27B0','💜')">💜</div>
      <div class="avatar" style="background:#F44336;cursor:pointer;border:3px solid transparent" onclick="selectColor('#F44336','❤️')">❤️</div>
    </div>
    <button class="btn btn-y" onclick="saveProfil()" id="mp-save-btn">Créer le profil</button>
    <button class="btn btn-s" onclick="closeModal('m-profil')" style="margin-top:10px">Annuler</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════════════
function loadDB() {
  try { return JSON.parse(localStorage.getItem('driveai_db') || 'null') || initDB(); }
  catch(e) { return initDB(); }
}
function initDB() {
  return {
    version: 2,
    activeProfile: 'p1',
    profiles: {
      p1: { id:'p1', name:'Lucas', role:'conducteur', color:'#FFD600', emoji:'🚗',
            kmOrigin:0, kmOriginDate:'', kmCurrent:0, plan:[], progression:68,
            sessions:[], genZone:'Paris', genGoal:'Manœuvres & Carrefours' }
    },
    accompagnateurs: {}
  };
}
function saveDB() { localStorage.setItem('driveai_db', JSON.stringify(DB)); }
function activeProfile() { return DB.profiles[DB.activeProfile]; }
function allConducteurs() { return Object.values(DB.profiles).filter(p=>p.role==='conducteur'); }
function allAccompagnateurs() { return Object.values(DB.profiles).filter(p=>p.role==='accompagnateur'); }

let DB = loadDB();

// ═══════════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════════
const TABS = ['home','stats','gen','profils'];
function go(id) {
  TABS.forEach(t => {
    document.getElementById('s-'+t).style.display = t===id?'':'none';
    document.getElementById('t-'+t).classList.toggle('active', t===id);
  });
  render(id);
}
function render(id) {
  const fn = {home:renderHome, stats:renderStats, gen:renderGen, profils:renderProfils}[id];
  if(fn) fn();
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const DATES=[23,24,25,26,27,28,29];
const DEFAULT_TRIPS=[
  {day:'Lun',title:'Quartier résidentiel — Démarrage',distance:'5.2',duration:'25 min',difficulty:'Facile',focus:'Démarrage / Arrêt',icon:'🌅'},
  {day:'Mer',title:'Carrefours centre-ville',distance:'8.4',duration:'40 min',difficulty:'Moyen',focus:'Priorités',icon:'🚦'},
  {day:'Jeu',title:'Parking + créneaux',distance:'3.8',duration:'35 min',difficulty:'Moyen',focus:'Stationnement',icon:'🅿️'},
  {day:'Sam',title:'Première autoroute A6',distance:'22',duration:'20 min',difficulty:'Difficile',focus:'Voie rapide',icon:'🛣️'},
];
function trips() { const p=activeProfile(); return (p.plan||[]).length>0?p.plan:DEFAULT_TRIPS; }
function dc(d){return d==='Facile'?'de':d==='Moyen'?'dm':'dh'}
function di(d){return d==='Facile'?'🌅':d==='Moyen'?'🚦':d==='Difficile'?'🛣️':'🏆'}
function db(d){return d==='Facile'?'rgba(76,175,80,.12)':d==='Moyen'?'rgba(255,214,0,.12)':'rgba(255,107,0,.12)'}
function getLastKm() {
  const p=activeProfile(); const s=p.sessions||[];
  if(s.length===0) return p.kmOrigin||0;
  return s[s.length-1].kmApres||0;
}
let activeDay=3; const doneDays=[0,1,2];

// ═══════════════════════════════════════════════════════════
// MAP SVG
// ═══════════════════════════════════════════════════════════
function mapSVG(){
  return`<svg viewBox="0 0 400 185" style="position:absolute;inset:0;width:100%;height:100%">
  <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FFD600" stop-opacity=".9"/><stop offset="100%" stop-color="#FF6B00" stop-opacity=".9"/></linearGradient></defs>
  ${[40,80,120,160].map(y=>`<line x1="0" y1="${y}" x2="400" y2="${y}" stroke="#1E2535" stroke-width=".5"/>`).join('')}
  ${[60,120,180,240,300,360].map(x=>`<line x1="${x}" y1="0" x2="${x}" y2="185" stroke="#1E2535" stroke-width=".5"/>`).join('')}
  <path d="M0 130 Q100 110 180 130 Q260 150 340 120 L400 115" stroke="#2A3040" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M18 165 Q80 130 155 100 Q225 70 295 82 Q355 92 390 48" stroke="#1E3A5F" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path class="route-anim" d="M18 165 Q80 130 155 100 Q225 70 295 82 Q355 92 390 48" stroke="url(#rg)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="18" cy="165" r="9" fill="#FFD600"/><circle cx="18" cy="165" r="15" fill="#FFD600" opacity=".12"/>
  <circle cx="295" cy="82" r="5" fill="#FFD600" opacity=".7"/>
  <circle cx="390" cy="48" r="10" fill="#FF6B00"/><circle cx="390" cy="48" r="17" fill="#FF6B00" opacity=".1"/>
  <text x="28" y="178" fill="white" font-size="9" font-weight="600" font-family="system-ui">Départ</text>
  <text x="350" y="42" fill="white" font-size="9" font-weight="600" font-family="system-ui">Arrivée</text>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════
function renderHome(){
  const p=activeProfile(); const t=trips();
  const todayTrip=t[activeDay%t.length]||t[0];
  const totalKm=t.reduce((s,x)=>s+parseFloat(x.distance||0),0).toFixed(0);
  const conds=allConducteurs(); const accs=allAccompagnateurs();
  document.getElementById('s-home').innerHTML=`
  <div style="padding:0 18px 10px">
    <!-- Header with profile switcher -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--yl);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">DriveAI</div>
        <div style="font-size:24px;font-weight:900;color:#fff;letter-spacing:-.5px">Bonjour ${p.name} <span style="color:var(--yl)">›</span></div>
      </div>
      <div class="avatar" style="background:${p.color};cursor:pointer" onclick="go('profils')">${p.emoji}</div>
    </div>

    <!-- Profile switcher bar (conducteurs) -->
    ${conds.length>1?`
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Changer de conducteur</div>
      <div class="prof-bar">

function previewKm(){
  const o=parseFloat(document.getElementById('km-o')?.value||0);
  const c=parseFloat(document.getElementById('km-c')?.value||0);
  const d=document.getElementById('km-d')?.value||'';
  const prev=document.getElementById('km-prev');
  if(!prev)return;
  prev.style.display=o>0?'block':'none';
  prev.innerHTML=`<div style="font-size:11px;color:var(--mu);margin-bottom:3px">Compteur actuel estimé</div>
    <div style="font-size:28px;font-weight:900;color:#fff">${(o+c).toLocaleString('fr')} <span style="font-size:13px;color:var(--mu)">km</span></div>
    <div style="font-size:11px;color:var(--gn);margin-top:2px">+${c} km depuis le ${d||'?'}</div>`;
}
function saveKm(){
  const p=activeProfile();
  p.kmOrigin=parseFloat(document.getElementById('km-o')?.value||0);
  p.kmOriginDate=document.getElementById('km-d')?.value||'';
  p.kmCurrent=parseFloat(document.getElementById('km-c')?.value||0);
  saveDB(); showToast('✅ Kilométrage enregistré'); renderStats();
}
function calcKmDate(){
  const p=activeProfile();
  const target=document.getElementById('km-target')?.value;
  const res=document.getElementById('km-target-res');
  if(!target||!p.kmOriginDate){if(res)res.style.display='none';return;}
  const origin=new Date(p.kmOriginDate);
  const tgt=new Date(target);
  const today=new Date();
  const totalDays=Math.max(1,(today-origin)/86400000);
  const tgtDays=(tgt-origin)/86400000;
  if(tgtDays<0){if(res)res.style.display='none';return;}
  const avg=p.kmCurrent/totalDays;
  const est=Math.round(p.kmOrigin+avg*tgtDays);
  document.getElementById('km-target-val').textContent=est.toLocaleString('fr')+' km';
  document.getElementById('km-target-sub').textContent='≈ +'+(Math.max(0,est-p.kmOrigin)).toLocaleString('fr')+' km depuis l\'origine · ~'+avg.toFixed(1)+' km/jour';
  res.style.display='block';
}
function deleteSession(pid,idx){
  if(!confirm('Supprimer cette leçon ?'))return;
  const p=DB.profiles[pid];
  p.sessions.splice(idx,1);
  if(p.sessions.length>0){const last=p.sessions[p.sessions.length-1];p.kmCurrent=Math.max(0,(last.kmApres||0)-p.kmOrigin);}
  saveDB(); showToast('Session supprimée'); renderStats(); renderHome();
}
function clearSessions(){
  if(!confirm('Effacer TOUTES les sessions de '+activeProfile().name+' ?'))return;
  activeProfile().sessions=[];activeProfile().kmCurrent=0;
  saveDB();showToast('Historique effacé');renderStats();renderHome();
}

// EXPORT / IMPORT JSON → Fichiers iPhone
// ═══════════════════════════════════════════════════════════
function exportJSON(){
  const data={version:2,exportDate:new Date().toISOString(),...DB};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='DriveAI-'+new Date().toISOString().split('T')[0]+'.json';
  // iOS Safari: télécharge dans Fichiers > Téléchargements
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  showToast('⬇ JSON téléchargé dans Fichiers');
}
function importJSON(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.version)throw new Error('Format invalide');
        DB=data;saveDB();
        const nb=Object.values(data.profiles||{}).reduce((s,p)=>s+(p.sessions||[]).length,0);
        showToast('✅ Import réussi · '+nb+' leçons · '+Object.keys(data.profiles||{}).length+' profils');
        go('home');
      }catch(err){showToast('❌ Fichier JSON invalide');}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function copyClipboard(){
  navigator.clipboard.writeText(JSON.stringify(DB,null,2))
    .then(()=>showToast('📋 JSON copié dans le presse-papier'))
    .catch(()=>showToast('Copie non supportée'));
}

      <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:6px;position:relative">IA génère ton plan</div>
      <div style="font-size:12px;color:var(--mu);line-height:1.6;position:relative">Planning hebdomadaire adapté à ton niveau.</div>
    </div>
    <div class="lbl">Zone de conduite</div>
    <input id="g-zone" type="text" value="${p.genZone||'Paris'}" style="margin-bottom:12px">
    <div class="lbl">Objectif principal</div>
    <input id="g-goal" type="text" value="${p.genGoal||'Manœuvres'}" style="margin-bottom:12px">
    <div class="lbl">Jours disponibles</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d=>`<button class="chip ${['Lun','Mer','Jeu','Sam'].includes(d)?'on':''}" onclick="this.classList.toggle('on')" data-day="${d}">${d}</button>`).join('')}
    </div>
    <div class="lbl">Durée par session</div>
    <div style="display:flex;gap:8px;margin-bottom:18px">
      ${['30 min','45 min','60 min'].map(d=>`<button class="chip${d==='45 min'?' on':''}" onclick="document.querySelectorAll('[data-dur]').forEach(b=>b.classList.remove('on'));this.classList.add('on')" data-dur="${d}" style="flex:1">${d}</button>`).join('')}
    </div>
    <button class="btn btn-y" id="gen-btn" onclick="doGenerate()" ${genState.loading?'disabled':''}>
      ${genState.loading?'<span style="display:flex;align-items:center;justify-content:center;gap:10px"><span class="spinner"></span>Génération…</span>':'🧠 Générer mon planning'}
    </button>
    ${genState.error?`<div style="background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);border-radius:12px;padding:12px;margin-top:12px;font-size:13px;color:var(--or)">${genState.error}</div>`:''}
    ${(p.plan||[]).length>0?`
    <div style="margin-top:22px">
      <div class="sect">Plan généré ✓</div>
      ${p.plan.map((t,i)=>`
      <div style="background:var(--sf);border:1px solid ${t.difficulty==='Facile'?'rgba(76,175,80,.3)':t.difficulty==='Moyen'?'rgba(255,214,0,.2)':'rgba(255,107,0,.25)'};border-radius:16px;margin-bottom:10px;overflow:hidden">
        <div style="padding:14px 16px;display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:12px;background:${db(t.difficulty)};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${t.icon||di(t.difficulty)}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
              <span style="font-size:13px;font-weight:700;color:#fff">${t.day} — ${t.title}</span>
              <span class="diff ${dc(t.difficulty)}">${t.difficulty.toUpperCase()}</span>
            </div>
            <div style="font-size:11px;color:var(--mu)">${t.distance} · ${t.duration} · ${t.focus}</div>
            ${t.description?`<div style="font-size:11px;color:#555;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.description}</div>`:''}
          </div>
        </div>
        <div style="display:flex;border-top:1px solid var(--bd)">
          <button onclick="openNav('${(t.title||'').replace(/'/g,'')}')" style="flex:1;padding:10px;background:rgba(0,100,255,.08);border:none;border-right:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit">
            <span style="font-size:15px">😊</span><span style="font-size:12px;font-weight:700;color:#00AAFF">Waze</span>
          </button>
          <button onclick="openAppleMaps('${(t.title||'').replace(/'/g,'')}')" style="flex:1;padding:10px;background:rgba(255,255,255,.04);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit">
            <span style="font-size:15px">🗺️</span><span style="font-size:12px;font-weight:700;color:var(--gn)">Plans</span>
          </button>
        </div>
      </div>`).join('')}
      <button class="btn btn-y" onclick="validatePlan()" style="margin-top:6px">✓ Valider ce plan</button>
      <button class="btn btn-s" onclick="doGenerate()" style="margin-top:10px">Régénérer ↺</button>
    </div>`:''}
  </div>`;
}
function validatePlan(){saveDB();showToast('✅ Plan validé !');go('home')}
async function doGenerate(){
  const p=activeProfile();
  const zone=document.getElementById('g-zone')?.value||'Paris';
  const goal=document.getElementById('g-goal')?.value||'Conduite';
  const selDays=[...document.querySelectorAll('[data-day].on')].map(b=>b.dataset.day);
  const dur=document.querySelector('[data-dur].on')?.dataset.dur||'45 min';
  if(selDays.length===0){showToast('Sélectionne au moins un jour');return;}
  p.genZone=zone;p.genGoal=goal;
  genState.loading=true;genState.error='';renderGen();
  const prompt=`Tu es un moniteur auto-école. Génère un planning de conduite pour ${p.name}.
Zone: ${zone} | Objectif: ${goal} | Jours: ${selDays.join(', ')} | Durée: ${dur} | Niveau: débutant-intermédiaire
Génère ${selDays.length} trajets, 1 par jour, difficulté croissante.
Réponds UNIQUEMENT en JSON valide sans texte avant/après:
{"plan":[{"day":"Lundi","title":"Titre court","distance":"X km","duration":"${dur}","difficulty":"Facile|Moyen|Difficile|Défi","focus":"Compétence","icon":"emoji","description":"1 phrase"}]}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('');
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    p.plan=parsed.plan||[];
    genState.loading=false;saveDB();renderGen();showToast('🧠 Plan généré !');
  }catch(e){genState.loading=false;genState.error='⚠️ Erreur. Vérifie ta connexion.';renderGen();}
}

// ═══════════════════════════════════════════════════════════
// PROFILS
// ═══════════════════════════════════════════════════════════
function renderProfils(){
  const conds=allConducteurs();const accs=allAccompagnateurs();
  document.getElementById('s-profils').innerHTML=`
  <div style="padding:0 18px 10px">
    <div style="font-size:26px;font-weight:900;color:#fff;margin-bottom:20px">👥 Profils</div>

    <!-- Conducteurs -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sect" style="margin:0">🚗 Conducteurs</div>
      <button onclick="openAddProfil('conducteur')" style="background:var(--yl);color:#000;font-size:12px;font-weight:700;padding:6px 14px;border-radius:10px;border:none;cursor:pointer">+ Ajouter</button>
    </div>
    ${conds.map(p=>profilCard(p)).join('')}

    <!-- Accompagnateurs -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:20px">
      <div class="sect" style="margin:0">👤 Accompagnateurs</div>
      <button onclick="openAddProfil('accompagnateur')" style="background:var(--sf);color:var(--tx);font-size:12px;font-weight:700;padding:6px 14px;border-radius:10px;border:1px solid var(--bd);cursor:pointer">+ Ajouter</button>
    </div>
    ${accs.length>0?accs.map(p=>profilCard(p)).join(''):'<div style="font-size:13px;color:var(--mu);padding:16px 0;text-align:center">Aucun accompagnateur ajouté</div>'}

    <!-- Stats globales -->
    <div style="margin-top:20px">
      <div class="sect">📊 Stats globales</div>
      ${conds.map(p=>{
        const totalKm=p.kmCurrent||0;const nb=p.sessions?.length||0;
        return`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px">
          <div class="avatar" style="background:${p.color}">${p.emoji}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700;color:#fff">${p.name}</div>
            <div style="font-size:11px;color:var(--mu);margin-top:3px">${nb} leçons · ${totalKm} km parcourus · ${p.progression||0}% progression</div>
            <div style="margin-top:8px"><div class="prog-t"><div class="prog-f" style="width:${p.progression||0}%"></div></div></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function profilCard(p){
  const isActive=p.id===DB.activeProfile;
  const nb=p.sessions?.length||0;
  return`<div style="background:${isActive?'linear-gradient(135deg,#1A1500,#1F1A00)':'var(--sf)'};border:1px solid ${isActive?'rgba(255,214,0,.4)':'var(--bd)'};border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px">
    <div class="avatar" style="background:${p.color};border:${isActive?'3px solid var(--yl)':'3px solid transparent'}">${p.emoji}</div>
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:15px;font-weight:700;color:#fff">${p.name}</span>
        ${isActive?'<span style="font-size:10px;font-weight:700;background:var(--yl);color:#000;padding:2px 8px;border-radius:6px">ACTIF</span>':''}
      </div>
      <div style="font-size:11px;color:var(--mu);margin-top:2px">${p.role==='conducteur'?'Conducteur':'Accompagnateur'} · ${nb} leçon${nb>1?'s':''}</div>
    </div>
    <div style="display:flex;gap:6px">
      ${p.role==='conducteur'&&!isActive?`<button onclick="switchProfile('${p.id}')" style="font-size:11px;font-weight:700;background:var(--yl);color:#000;border:none;border-radius:10px;padding:6px 12px;cursor:pointer">Activer</button>`:''}
      <button onclick="editProfil('${p.id}')" style="font-size:18px;background:none;border:none;cursor:pointer">✏️</button>
      ${p.id!=='p1'?`<button onclick="deleteProfil('${p.id}')" style="font-size:18px;background:none;border:none;cursor:pointer">🗑</button>`:''}
    </div>
  </div>`;
}

// Profil modal
let newProfilColor='#FFD600';let newProfilEmoji='🚗';let newProfilRole='conducteur';let editingProfilId=null;
function openAddProfil(role){
  editingProfilId=null;newProfilRole=role;newProfilColor='#FFD600';newProfilEmoji='🚗';
  document.getElementById('mp-title').textContent='Nouveau profil';
  document.getElementById('mp-sub').textContent=role==='conducteur'?'Élève conducteur':'Accompagnateur';
  document.getElementById('mp-name').value='';
  document.getElementById('mp-save-btn').textContent='Créer le profil';
  setRole(role);openModal('m-profil');
}
function editProfil(id){
  editingProfilId=id;const p=DB.profiles[id];
  newProfilRole=p.role;newProfilColor=p.color;newProfilEmoji=p.emoji;
  document.getElementById('mp-title').textContent='Modifier '+p.name;
  document.getElementById('mp-sub').textContent=p.role==='conducteur'?'Conducteur':'Accompagnateur';
  document.getElementById('mp-name').value=p.name;
  document.getElementById('mp-save-btn').textContent='Enregistrer';
  setRole(p.role);openModal('m-profil');
}
function setRole(r){
  newProfilRole=r;
  document.getElementById('r-cond').className=r==='conducteur'?'btn btn-y':'btn btn-s';
  document.getElementById('r-acc').className=r==='accompagnateur'?'btn btn-y':'btn btn-s';
  document.getElementById('r-cond').style.fontSize='13px';document.getElementById('r-cond').style.padding='12px';
  document.getElementById('r-acc').style.fontSize='13px';document.getElementById('r-acc').style.padding='12px';
}
function selectColor(col,emoji){
  newProfilColor=col;newProfilEmoji=emoji;
  document.querySelectorAll('#mp-colors .avatar').forEach(a=>{a.style.border='3px solid transparent';});
  event.target.closest('.avatar').style.border='3px solid white';
}
function saveProfil(){
  const name=document.getElementById('mp-name').value.trim();
  if(!name){showToast('Entre un prénom');return;}
  if(editingProfilId){
    const p=DB.profiles[editingProfilId];
    p.name=name;p.role=newProfilRole;p.color=newProfilColor;p.emoji=newProfilEmoji;
    showToast('Profil mis à jour');
  } else {
    const id='p'+Date.now();
    DB.profiles[id]={id,name,role:newProfilRole,color:newProfilColor,emoji:newProfilEmoji,
      kmOrigin:0,kmOriginDate:'',kmCurrent:0,plan:[],progression:0,sessions:[],genZone:'Paris',genGoal:'Conduite'};
    if(newProfilRole==='conducteur') DB.activeProfile=id;
    showToast('Profil '+name+' créé !');
  }
  saveDB();closeModal('m-profil');renderProfils();renderHome();
}
function deleteProfil(id){
  if(!confirm('Supprimer ce profil et toutes ses données ?'))return;
  delete DB.profiles[id];
  if(DB.activeProfile===id) DB.activeProfile=Object.keys(DB.profiles)[0];
  saveDB();renderProfils();renderHome();showToast('Profil supprimé');
}

// ═══════════════════════════════════════════════════════════
// LECON MODAL
// ═══════════════════════════════════════════════════════════
function openLecon(){
  const p=activeProfile();
  document.getElementById('lecon-who').textContent=p.name+' · Coach AAC';
  document.getElementById('l-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('l-km').value='';
  document.getElementById('l-note').value='';
  document.getElementById('l-dur').value='';
  document.querySelectorAll('#l-chips .chip').forEach((c,i)=>{c.classList.toggle('on',i===0)});
  // Populate accompagnateurs selector
  const sel=document.getElementById('l-acc');
  sel.innerHTML='<option value="">— Aucun accompagnateur —</option>'+
    allAccompagnateurs().map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  renderLeconHist();updateDelta();
  openModal('m-lecon');
}
function updateDelta(){
  const val=parseFloat(document.getElementById('l-km')?.value||0);
  const delta=document.getElementById('l-delta');if(!delta)return;
  const last=getLastKm();
  if(val>0&&last>0&&val>last){delta.textContent='+'+( val-last).toFixed(1)+' km cette leçon | Compteur précédent: '+last.toLocaleString('fr')+' km';delta.style.color='var(--gn)';}
  else if(val>0&&activeProfile().kmOrigin>0){delta.textContent='+'+( val-activeProfile().kmOrigin).toFixed(1)+' km depuis le départ';delta.style.color='var(--yl)';}
  else delta.textContent='';
}
function saveLecon(){
  const km=parseFloat(document.getElementById('l-km')?.value||0);
  if(!km||km<=0){showToast('Saisis le km compteur');return;}
  const p=activeProfile();const last=getLastKm();
  const sess={kmApres:km,kmLecon:Math.max(0,km-last),date:document.getElementById('l-date')?.value||'',dur:document.getElementById('l-dur')?.value||'',note:document.getElementById('l-note')?.value||'',types:[...document.querySelectorAll('#l-chips .chip.on')].map(c=>c.textContent.trim()),accId:document.getElementById('l-acc')?.value||''};
  if(!p.sessions)p.sessions=[];
  p.sessions.push(sess);p.kmCurrent=Math.max(0,km-p.kmOrigin);
  saveDB();showToast('✅ Leçon +'+sess.kmLecon.toFixed(1)+' km enregistrée');
  renderLeconHist();renderHome();
}
function renderLeconHist(){
  const block=document.getElementById('l-hist');if(!block)return;
  const s=activeProfile().sessions||[];
  if(s.length===0){block.innerHTML='';return;}
  const recent=[...s].slice(-3).reverse();
  block.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">3 dernières leçons</div>`
    +recent.map((sess,ri)=>{
      const idx=s.length-1-ri;
      return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)">
        <div style="font-size:14px">🚗</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">${sess.date||'?'}${sess.dur?' · '+sess.dur:''}</div><div style="font-size:11px;color:var(--mu)">${(sess.types||[]).join(' ')}</div></div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:800;color:var(--gn)">+${sess.kmLecon?.toFixed(1)||'?'} km</div>
          <button onclick="deleteSession('${activeProfile().id}',${idx});renderLeconHist()" style="font-size:10px;color:var(--or);background:none;border:none;cursor:pointer;font-family:inherit">🗑 Suppr.</button>
        </div>
      </div>`;
    }).join('');
}

  const zone=activeProfile().genZone||'Paris';

  document.getElementById('m-nav-content').innerHTML=`
    <div class="modal-handle"></div>
    <div style="font-size:19px;font-weight:900;color:#fff;margin-bottom:4px">Naviguer vers</div>
    <div style="font-size:13px;color:var(--mu);margin-bottom:20px">${title}</div>
    <a href="waze://?q=${dest}&navigate=yes" style="display:flex;align-items:center;gap:14px;background:rgba(0,100,255,.08);border:1px solid rgba(0,170,255,.3);border-radius:18px;padding:16px 18px;margin-bottom:10px;text-decoration:none">
      <div style="width:48px;height:48px;border-radius:14px;background:#00AAFF;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">😊</div>
      <div style="flex:1"><div style="font-size:16px;font-weight:800;color:#fff">Waze</div><div style="font-size:12px;color:var(--mu);margin-top:2px">Trafic · Radars · Navigation temps réel</div></div>
      <span style="color:#00AAFF;font-size:22px">›</span>
    </a>
    <a href="maps://?daddr=${dest}&dirflg=d" style="display:flex;align-items:center;gap:14px;background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.3);border-radius:18px;padding:16px 18px;margin-bottom:10px;text-decoration:none">
      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#34C759,#30D158);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">🗺️</div>
      <div style="flex:1"><div style="font-size:16px;font-weight:800;color:#fff">Apple Plans</div><div style="font-size:12px;color:var(--mu);margin-top:2px">Navigation native iOS · Siri intégré</div></div>
      <span style="color:var(--gn);font-size:22px">›</span>
    </a>
    <div style="background:rgba(0,166,81,.08);border:1px solid rgba(0,166,81,.25);border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">💡</span>
      <span style="font-size:12px;color:var(--mu);line-height:1.5">Lance <strong style="color:#fff">Coach AAC</strong> en arrière-plan avant de naviguer — les 3 apps tourneront simultanément.</span>
    </div>
    <button onclick="closeModal('m-nav')" class="btn btn-s">Annuler</button>`;
  openModal('m-nav');
}
function openAppleMaps(title){
  const dest=encodeURIComponent((activeProfile().genZone||'Paris')+' '+title);
  window.location.href='maps://?daddr='+dest+'&dirflg=d';
}

// MODAL HELPERS
// ═══════════════════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// INIT

renderHome();
</script>
