<style>
:root{--bg:#0D1117;--sf:#161B25;--bd:#1E2535;--yl:#FFD600;--or:#FF6B00;--gn:#4CAF50;--bl:#2196F3;--pu:#9C27B0;--rd:#F44336;--tx:#FFF;--mu:#8B95A1;--dm:#2A3040;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,20px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:calc(84px + var(--sb))}
.scr::-webkit-scrollbar{display:none}
.st{padding-top:calc(var(--st) + 10px)}
.tbr{flex-shrink:0;background:rgba(13,17,23,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;padding-bottom:var(--sb);padding-top:10px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0}
.tlb{font-size:10px;font-weight:600;color:#444}
.tab.on .tlb{color:var(--yl)}
input,select,textarea{background:var(--sf);border:1px solid var(--bd);border-radius:14px;color:var(--tx);font-size:15px;font-weight:600;padding:13px 16px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--mu);font-weight:400}
.btn{padding:14px;border-radius:16px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.by{background:var(--yl);color:#000}.by:disabled{background:var(--dm);color:#666;cursor:default}
.bs{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.bb{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}
.bg{background:rgba(76,175,80,.12);border:1px solid rgba(76,175,80,.4);color:var(--gn)}
.br{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);color:var(--rd)}
.bo{background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);color:var(--or)}
.diff{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;letter-spacing:.5px}
.de{background:rgba(76,175,80,.15);color:#4CAF50}
.dm{background:rgba(255,214,0,.15);color:#FFD600}
.dh{background:rgba(255,107,0,.15);color:#FF6B00}
.pt{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--yl),var(--or));transition:width 1s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--yl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes dr{to{stroke-dashoffset:0}}
.ra{stroke-dasharray:600;stroke-dashoffset:600;animation:dr 2.2s ease forwards .4s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.pls{animation:pu 1.4s infinite}
.chip{padding:7px 13px;border-radius:10px;border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;background:var(--dm);color:var(--mu);transition:all .15s}
.chip.on{background:var(--yl);border-color:var(--yl);color:#000}
.mw{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center}
.mw.open{display:flex}
.mbd{position:absolute;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px)}
.msh{position:relative;z-index:1;width:100%;max-width:480px;background:#161B25;border-radius:28px 28px 0 0;border-top:1px solid var(--bd);padding:0 20px calc(var(--sb) + 20px);animation:su .35s cubic-bezier(.34,1.2,.64,1);max-height:92vh;overflow-y:auto}
.msh::-webkit-scrollbar{display:none}
.mh{width:40px;height:4px;border-radius:2px;background:var(--dm);margin:12px auto 20px}
.fab{position:fixed;bottom:calc(90px + var(--sb) + 14px);right:18px;width:56px;height:56px;border-radius:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;z-index:100;transition:transform .15s}
.fab:active{transform:scale(.91)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#000;flex-shrink:0}
.row{display:flex;gap:10px}.row>*{flex:1}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.bk{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--yl);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;padding:0;margin-bottom:16px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:18px;margin-bottom:14px}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#1E2535;color:white;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1}
</style>
</head>

function calcO(){

  var ss=p.sess||[];

function delSess(pid,idx){

// ── EXPORT / IMPORT / SHARE ──────────────────────────────────
function expJSON(){
  var data=JSON.parse(JSON.stringify(DB));
  data.exportDate=new Date().toISOString();
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='DriveAI-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  toast('JSON telecharge');
}
function impJSONFile(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){doImport(ev.target.result);};
    r.readAsText(file);
  };
  inp.click();
}
function doImport(txt){
  try{
    var data=JSON.parse(txt);
    if(!data.version)throw new Error('format invalide');
    var key=DB.apiKey,prov=DB.prov;
    DB=data;DB.apiKey=data.apiKey||key;DB.prov=data.prov||prov;
    sDB();
    var nb=0;
    Object.values(data.profiles||{}).forEach(function(p){nb+=(p.sess||[]).length;});
    toast('Import OK: '+nb+' lecons');
    go('h');
  }catch(e){toast('JSON invalide');}
}
function showPasteModal(){
  var h='<div class="mh"></div>';
  h+='<div style="font-size:19px;font-weight:900;color:#fff;margin-bottom:4px">Importer JSON</div>';
  h+='<div style="font-size:12px;color:var(--mu);margin-bottom:16px">Colle le JSON partage</div>';
  h+='<textarea id="paste-area" rows="7" style="font-size:12px;font-family:monospace;margin-bottom:14px" placeholder="Colle le JSON ici"></textarea>';
  h+='<button class="btn by" id="do-paste-btn">Importer</button>';
  h+='<button class="btn bs" id="cancel-paste-btn" style="margin-top:10px">Annuler</button>';
  document.getElementById('mnav-c').innerHTML=h;
  document.getElementById('do-paste-btn').onclick=function(){
    var txt=document.getElementById('paste-area').value||'';
    doImport(txt);cm('mnav');
  };
  document.getElementById('cancel-paste-btn').onclick=function(){cm('mnav');};
}
function copyTxt(txt){
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){toast('Copie !');}).catch(function(){toast('Erreur copie');});
  } else {
    toast('Copie non supportee');
  }
}

async function doGen(){
  var p=AP();
  var zone=document.getElementById('g-zone').value||'Paris';
  var goal=document.getElementById('g-goal').value||'Conduite';
  var selDays=Array.prototype.map.call(document.querySelectorAll('#day-chips .chip.on'),function(b){return b.dataset.day;});
  var durEl=document.querySelector('#dur-chips .chip.on');
  var dur=durEl?durEl.dataset.dur:'45 min';
  if(!selDays.length){toast('Selectionne un jour');return;}
  if(!DB.apiKey){toast('Cle API manquante');go('s');return;}
  p.zone=zone;p.goal=goal;
  var o=calcO();
  var kmInfo=o.ks?('Objectif: '+o.ks+' km cette semaine ('+o.kr+' km restants sur '+o.ko+'km). '):'';
  gLoad=true;gErr='';rG();
  var prompt='Tu es moniteur auto-ecole expert AAC. Genere planning pour '+p.name+'.\n'
    +'Zone: '+zone+' | Objectif: '+goal+' | Jours: '+selDays.join(', ')+' | Duree: '+dur+'\n'
    +kmInfo+'Niveau debutant-intermediaire. Difficulte progressant dans la semaine.\n'
    +'Reponds UNIQUEMENT en JSON valide:\n'
    +'{"plan":[{"day":"Lundi","title":"Titre","distance":"X km","duration":"'+dur+'","difficulty":"Facile|Moyen|Difficile|Defi","focus":"Competence","icon":"emoji","description":"1 phrase"}]}';
  try{
    var res,data,text,parsed;
    if(DB.prov==='groq'){
      res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+DB.apiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
      data=await res.json();
      if(data.error)throw new Error(data.error.message||'Erreur Groq');
      text=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
    }else{
      res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':DB.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
      data=await res.json();
      if(data.error)throw new Error(data.error.message||'Erreur API');
      text=(data.content||[]).map(function(c){return c.text||'';}).join('');
    }
    parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    p.plan=parsed.plan||[];
    gLoad=false;sDB();rG();toast('Plan genere !');
  }catch(e){gLoad=false;gErr='Erreur: '+e.message;rG();}
}

  var p=AP();
  var h='<div class="mh"></div>';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px"><div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#00A651,#007A3D);display:flex;align-items:center;justify-content:center;font-size:22px">\uD83D\uDE97</div><div><div style="font-size:19px;font-weight:900;color:#fff">Lecon terminee</div><div style="font-size:12px;color:var(--mu)">'+p.name+' - Coach AAC</div></div></div>';
  h+='<div style="padding:16px;background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.2);border-radius:18px;margin-bottom:14px">';
  h+='<div class="lbl">Km compteur apres la lecon</div><input type="number" id="l-km" placeholder="ex: 12683" inputmode="numeric" style="background:none;border:none;border-bottom:2px solid var(--yl);border-radius:0;font-size:30px;font-weight:900;padding:8px 0">';
  h+='<div id="l-delta" style="font-size:12px;color:var(--gn);margin-top:6px;min-height:16px"></div></div>';
  h+='<div class="row" style="margin-bottom:14px"><div><div class="lbl">Date</div><input type="date" id="l-date" value="'+new Date().toISOString().split('T')[0]+'" style="font-size:14px;padding:12px"></div>';
  h+='<div><div class="lbl">Duree</div><input type="text" id="l-dur" placeholder="1h30" style="font-size:14px;padding:12px"></div></div>';
  h+='<div class="lbl">Accompagnateur</div><select id="l-acc" style="margin-bottom:14px;font-size:14px;padding:12px"><option value="">-- Aucun --</option>';
  accs().forEach(function(a){h+='<option value="'+a.id+'">'+a.name+'</option>';});
  h+='</select>';
  h+='<div class="lbl">Type</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="l-chips">';
  ['Ville','Route','Parking','Ronds-pts','Nuit','Pluie'].forEach(function(t,i){h+='<button class="chip'+(i===0?' on':'')+'">'+t+'</button>';});
  h+='</div><div class="lbl">Note</div><input type="text" id="l-note" placeholder="Ex: creneaux reussis..." style="margin-bottom:16px;font-weight:400">';
  h+='<button class="btn by" id="save-lecon-btn">Enregistrer</button>';
  h+='<button class="btn bs" id="back-home-btn" style="margin-top:10px;font-size:13px;padding:12px">\u2190 Retour Accueil</button>';
  h+='<button class="btn" id="share-from-lecon-btn" style="margin-top:8px;font-size:13px;padding:12px;background:rgba(156,39,176,.1);border:1px solid rgba(156,39,176,.4);color:#CE93D8">Partager progression</button>';
  h+='<div id="l-hist" style="margin-top:18px"></div>';
  document.getElementById('mlecon-c').innerHTML=h;
  document.querySelectorAll('#l-chips .chip').forEach(function(c){c.onclick=function(){c.classList.toggle('on');};});
  document.getElementById('l-km').oninput=updDelta;
  document.getElementById('save-lecon-btn').onclick=saveLecon;
  document.getElementById('back-home-btn').onclick=function(){cm('mlecon');go('h');};
  document.getElementById('share-from-lecon-btn').onclick=function(){cm('mlecon');showShareModal();};
  renderLeconHist();
  updDelta();
  om('mlecon');
}
function updDelta(){
  var val=parseFloat(document.getElementById('l-km').value||0);
  var delta=document.getElementById('l-delta');
  var last=glk(),p=AP();
  if(val>0&&last>0&&val>last){delta.textContent='+'+(val-last).toFixed(1)+' km - Precedent: '+last.toLocaleString('fr')+' km';delta.style.color='var(--gn)';}
  else if(val>0&&p.kmO>0){delta.textContent='+'+(val-p.kmO).toFixed(1)+' km depuis le depart';delta.style.color='var(--yl)';}
  else{delta.textContent='';}
}
function saveLecon(){
  var km=parseFloat(document.getElementById('l-km').value||0);
  if(!km||km<=0){toast('Saisis le km compteur');return;}
  var p=AP(),last=glk();
  var types=Array.prototype.map.call(document.querySelectorAll('#l-chips .chip.on'),function(c){return c.textContent;});
  var sess={kma:km,kml:Math.max(0,km-last),date:document.getElementById('l-date').value||'',dur:document.getElementById('l-dur').value||'',note:document.getElementById('l-note').value||'',types:types,accId:document.getElementById('l-acc').value||''};
  if(!p.sess)p.sess=[];
  p.sess.push(sess);p.kmC=Math.max(0,km-p.kmO);
  sDB();toast('Lecon +'+sess.kml.toFixed(1)+' km');
  renderLeconHist();rH();
}
function renderLeconHist(){
  var block=document.getElementById('l-hist');if(!block)return;
  var s=AP().sess||[];
  if(!s.length){block.innerHTML='';return;}
  block.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">3 dernieres lecons</div>';
  s.slice(-3).reverse().forEach(function(sess,ri){
    var idx=s.length-1-ri;
    var div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)';
    div.innerHTML='\uD83D\uDE97<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">'+(sess.date||'?')+(sess.dur?' - '+sess.dur:'')+'</div><div style="font-size:11px;color:var(--mu)">'+((sess.types||[]).join(' '))+'</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:800;color:var(--gn)">+'+(sess.kml?sess.kml.toFixed(1):'?')+' km</div></div>';
    var db2=document.createElement('button');
    db2.style.cssText='font-size:10px;color:var(--or);background:none;border:none;cursor:pointer;font-family:inherit';
    db2.textContent='Suppr';
    db2.onclick=function(){delSess(AP().id,idx);renderLeconHist();};
    div.lastElementChild.appendChild(db2);
    block.appendChild(div);
  });
}

// ── NAVIGATION ────────────────────────────────────────────────
function oNav(title){
  var zone=AP().zone||'Paris';
  var dest=encodeURIComponent(zone+' '+title);
  var h='<div class="mh"></div>';
  h+='<div style="font-size:19px;font-weight:900;color:#fff;margin-bottom:4px">Naviguer vers</div>';
  h+='<div style="font-size:13px;color:var(--mu);margin-bottom:20px">'+title+'</div>';
  h+='<a href="waze://?q='+dest+'&navigate=yes" style="display:flex;align-items:center;gap:14px;background:rgba(0,100,255,.08);border:1px solid rgba(0,170,255,.3);border-radius:18px;padding:16px 18px;margin-bottom:10px;text-decoration:none">';
  h+='<div style="width:48px;height:48px;border-radius:14px;background:#00AAFF;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">\uD83D\uDE01</div>';
  h+='<div style="flex:1"><div style="font-size:16px;font-weight:800;color:#fff">Waze</div><div style="font-size:12px;color:var(--mu);margin-top:2px">Trafic - Radars</div></div><span style="color:#00AAFF;font-size:22px">\u203A</span></a>';
  h+='<a href="maps://?daddr='+dest+'&dirflg=d" style="display:flex;align-items:center;gap:14px;background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.3);border-radius:18px;padding:16px 18px;margin-bottom:10px;text-decoration:none">';
  h+='<div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#34C759,#30D158);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">\uD83D\uDDFA\uFE0F</div>';
  h+='<div style="flex:1"><div style="font-size:16px;font-weight:800;color:#fff">Apple Plans</div><div style="font-size:12px;color:var(--mu);margin-top:2px">Navigation native iOS</div></div><span style="color:var(--gn);font-size:22px">\u203A</span></a>';
  h+='<div style="background:rgba(0,166,81,.08);border:1px solid rgba(0,166,81,.25);border-radius:14px;padding:12px 16px;margin-bottom:16px">\uD83D\uDCA1 Lance Coach AAC en fond avant de naviguer.</div>';
  h+='<button class="btn bs" id="cancel-nav-btn">Annuler</button>';
  document.getElementById('mnav-c').innerHTML=h;
  document.getElementById('cancel-nav-btn').onclick=function(){cm('mnav');};
  om('mnav');
}

// ── BACKDROP CLICKS ───────────────────────────────────────────
document.getElementById('mlecon-bd').onclick=function(){cm('mlecon');};
document.getElementById('mnav-bd').onclick=function(){cm('mnav');};
document.getElementById('mprof-bd').onclick=function(){cm('mprof');};
document.getElementById('mshare-bd').onclick=function(){cm('mshare');};
document.getElementById('fabAAC').onclick=openLecon;

// ── INIT ──────────────────────────────────────────────────────
rH();
</script>
