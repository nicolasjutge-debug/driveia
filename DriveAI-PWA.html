<style>
:root{--bg:#0D1117;--sf:#161B25;--bd:#1E2535;--yl:#FFD600;--or:#FF6B00;--gn:#4CAF50;--bl:#2196F3;--tx:#FFF;--mu:#8B95A1;--dm:#2A3040;--rd:#F44336;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,20px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:calc(82px + var(--sb))}
.screen::-webkit-scrollbar{display:none}
.safe-top{padding-top:calc(var(--st) + 10px)}
.tabbar{flex-shrink:0;background:rgba(13,17,23,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;padding-bottom:var(--sb);padding-top:10px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0}
.tab-lbl{font-size:10px;font-weight:600;color:#444}
.tab.active .tab-lbl{color:var(--yl)}
input,select,textarea{background:var(--sf);border:1px solid var(--bd);border-radius:14px;color:var(--tx);font-size:15px;font-weight:600;padding:13px 16px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--mu);font-weight:400}
.btn{padding:15px;border-radius:16px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.by{background:var(--yl);color:#000}.by:disabled{background:var(--dm);color:#555;cursor:default}
.bs{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.bb{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}
.bg2{background:rgba(76,175,80,.12);border:1px solid rgba(76,175,80,.4);color:var(--gn)}
.br{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);color:var(--rd)}
.bo{background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);color:var(--or)}
.bp{background:linear-gradient(135deg,#6A1B9A,#8E24AA);color:#fff}
.diff{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;letter-spacing:.5px}
.de{background:rgba(76,175,80,.15);color:#4CAF50}.dm2{background:rgba(255,214,0,.15);color:#FFD600}.dh{background:rgba(255,107,0,.15);color:#FF6B00}
.pt{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--yl),var(--or));transition:width 1s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--yl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes dr{to{stroke-dashoffset:0}}
.ra{stroke-dasharray:600;stroke-dashoffset:600;animation:dr 2.2s ease forwards .4s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pu 1.4s infinite}
.chip{padding:7px 13px;border-radius:10px;border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;background:var(--dm);color:var(--mu);transition:all .15s}
.chip.on{background:var(--yl);border-color:var(--yl);color:#000}
.mw{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center}
.mw.open{display:flex}
.mbd{position:absolute;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px)}
.msh{position:relative;z-index:1;width:100%;max-width:480px;background:#161B25;border-radius:28px 28px 0 0;border-top:1px solid var(--bd);padding:0 20px calc(var(--sb) + 20px);animation:su .35s cubic-bezier(.34,1.2,.64,1);max-height:92vh;overflow-y:auto}
.msh::-webkit-scrollbar{display:none}
.mh{width:40px;height:4px;border-radius:2px;background:var(--dm);margin:12px auto 20px}
.fab{position:fixed;bottom:calc(90px + var(--sb) + 14px);right:18px;width:56px;height:56px;border-radius:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;z-index:100;transition:transform .15s}
.fab:active{transform:scale(.91)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#000;flex-shrink:0}
.row{display:flex;gap:10px}.row>*{flex:1}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.sect{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:12px}
.bk{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--yl);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;padding:0;margin-bottom:16px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:18px;margin-bottom:14px}
.st{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#1E2535;color:white;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1}
/* Objectif card */
.obj-card{background:linear-gradient(135deg,#1A0A28,#120A1E);border:1px solid rgba(156,39,176,.4);border-radius:22px;padding:20px;margin-bottom:14px}
.obj-ring{position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;width:120px;height:120px}
.ring-bg{fill:none;stroke:#2A1A3A;stroke-width:10}
.ring-fg{fill:none;stroke:url(#rring);stroke-width:10;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1s ease}
</style>

<script>
// ═══ DB ══════════════════════════════════════════════════════
function iDB(){
  return {version:3,activeProfile:'p1',apiKey:'',apiProvider:'groq',
    profiles:{p1:{id:'p1',name:'Lucas',role:'conducteur',color:'#FFD600',ini:'L',
      kmOrigin:0,kmOriginDate:'',kmCurrent:425,plan:[],sessions:[],
      genZone:'Paris',genGoal:'Man\u0153uvres',
      dateNaissance:'',objectifKm:3000,datePermis:'',
      skills:{demarrage:0,virages:0,stationnement:0,voie_rapide:0,nuit:0,pluie:0}}}};
}
function lDB(){try{var d=JSON.parse(localStorage.getItem('dai_db')||'null');return d&&d.version?d:iDB();}catch(e){return iDB();}}
function sDB(){localStorage.setItem('dai_db',JSON.stringify(DB));}
var DB=lDB();
function ap(){return DB.profiles[DB.activeProfile];}
function conds(){return Object.values(DB.profiles).filter(function(p){return p.role==='conducteur';});}
function accs(){return Object.values(DB.profiles).filter(function(p){return p.role==='accompagnateur';});}
function prog(p){var s=p.skills||{};var v=Object.values(s);return v.length?Math.round(v.reduce(function(a,b){return a+b;},0)/v.length):0;}
function sc(v){return v>70?'var(--gn)':v>40?'var(--yl)':'var(--or)';}

// ═══ OBJECTIF CALCUL ═════════════════════════════════════════
function calcObjectif(p){
  var today=new Date();
  var kmFaits=p.kmCurrent||0;
  var kmObj=p.objectifKm||3000;
  var kmRestants=Math.max(0,kmObj-kmFaits);
  var dateButoir=null;
  // Date butoir = 18 ans ou date permis définie
  if(p.dateNaissance){
    var dn=new Date(p.dateNaissance);
    dateButoir=new Date(dn.getFullYear()+18,dn.getMonth(),dn.getDate());
  }
  if(p.datePermis){dateButoir=new Date(p.datePermis);}
  var joursRestants=dateButoir?Math.max(0,Math.round((dateButoir-today)/86400000)):null;
  var semainesRestantes=joursRestants?Math.ceil(joursRestants/7):null;
  var kmParSemaine=semainesRestantes&&semainesRestantes>0?Math.ceil(kmRestants/semainesRestantes):null;
  var kmParJour=joursRestants&&joursRestants>0?(kmRestants/joursRestants).toFixed(1):null;
  var pct=Math.min(100,Math.round((kmFaits/kmObj)*100));
  var enRetard=kmParSemaine&&kmParSemaine>120;
  return {kmFaits:kmFaits,kmObj:kmObj,kmRestants:kmRestants,dateButoir:dateButoir,joursRestants:joursRestants,semainesRestantes:semainesRestantes,kmParSemaine:kmParSemaine,kmParJour:kmParJour,pct:pct,enRetard:enRetard};
}

// ═══ ROUTING ════════════════════════════════════════════════
var TABS=['home','obj','gen','profils','settings'];
function go(id){
  TABS.forEach(function(t){document.getElementById('s-'+t).style.display=t===id?'':'none';document.getElementById('t-'+t).classList.toggle('active',t===id);});
  ({home:rHome,obj:rObj,gen:rGen,profils:rProfils,settings:rSettings}[id]||rHome)();
}

// ═══ HELPERS ════════════════════════════════════════════════
var DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'],DATES=[23,24,25,26,27,28,29];
var DT=[
  {day:'Lun',title:'Quartier r\xE9sidentiel',distance:'5.2',duration:'25 min',difficulty:'Facile',focus:'D\xE9marrage',icon:'\u{1F305}'},
  {day:'Mer',title:'Carrefours centre-ville',distance:'8.4',duration:'40 min',difficulty:'Moyen',focus:'Priorit\xE9s',icon:'\u{1F6A6}'},
  {day:'Jeu',title:'Parking + cr\xE9neaux',distance:'3.8',duration:'35 min',difficulty:'Moyen',focus:'Stationnement',icon:'\u{1F17F}'},
  {day:'Sam',title:'Premi\xE8re autoroute',distance:'22',duration:'20 min',difficulty:'Difficile',focus:'Voie rapide',icon:'\u{1F6E3}'},
];
function trips(){var p=ap();return(p.plan&&p.plan.length>0)?p.plan:DT;}
function dc(d){return d==='Facile'?'de':d==='Moyen'?'dm2':'dh';}
function di(d){return d==='Facile'?'🌅':d==='Moyen'?'🚦':d==='Difficile'?'🛣️':'🏆';}
function db(d){return d==='Facile'?'rgba(76,175,80,.12)':d==='Moyen'?'rgba(255,214,0,.12)':'rgba(255,107,0,.12)';}
function glk(){var p=ap();var s=p.sessions||[];return s.length===0?(p.kmOrigin||0):s[s.length-1].kmApres||0;}
var aDay=3,dDays=[0,1,2];

function mapSVG(){
  return'<svg viewBox="0 0 400 185" style="position:absolute;inset:0;width:100%;height:100%"><defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FFD600" stop-opacity=".9"/><stop offset="100%" stop-color="#FF6B00" stop-opacity=".9"/></linearGradient></defs><line x1="0" y1="40" x2="400" y2="40" stroke="#1E2535" stroke-width=".5"/><line x1="0" y1="80" x2="400" y2="80" stroke="#1E2535" stroke-width=".5"/><line x1="0" y1="120" x2="400" y2="120" stroke="#1E2535" stroke-width=".5"/><line x1="0" y1="160" x2="400" y2="160" stroke="#1E2535" stroke-width=".5"/><line x1="60" y1="0" x2="60" y2="185" stroke="#1E2535" stroke-width=".5"/><line x1="180" y1="0" x2="180" y2="185" stroke="#1E2535" stroke-width=".5"/><line x1="300" y1="0" x2="300" y2="185" stroke="#1E2535" stroke-width=".5"/><path d="M0 130 Q100 110 180 130 Q260 150 340 120 L400 115" stroke="#2A3040" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M18 165 Q80 130 155 100 Q225 70 295 82 Q355 92 390 48" stroke="#1E3A5F" stroke-width="11" fill="none" stroke-linecap="round"/><path class="ra" d="M18 165 Q80 130 155 100 Q225 70 295 82 Q355 92 390 48" stroke="url(#rg)" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="18" cy="165" r="9" fill="#FFD600"/><circle cx="18" cy="165" r="15" fill="#FFD600" opacity=".12"/><circle cx="390" cy="48" r="10" fill="#FF6B00"/><circle cx="390" cy="48" r="17" fill="#FF6B00" opacity=".1"/></svg>';
}

function tCard(tr,i){
  var f=i===0;
