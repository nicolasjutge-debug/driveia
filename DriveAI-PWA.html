<style>
:root{
  --bg:#0D1117;--sf:#161B25;--bd:#1E2535;
  --yl:#FFD600;--or:#FF6B00;--gn:#4CAF50;--bl:#2196F3;--pu:#9C27B0;--rd:#F44336;
  --tx:#FFF;--mu:#8B95A1;--dm:#2A3040;
  --st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,20px)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:calc(84px + var(--sb))}
.screen::-webkit-scrollbar{display:none}
.safe-top{padding-top:calc(var(--st) + 10px)}
.tabbar{flex-shrink:0;background:rgba(13,17,23,.97);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);
  display:flex;padding-bottom:var(--sb);padding-top:10px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:4px 0}
.tab span.lbl{font-size:10px;font-weight:600;color:#444}
.tab.active span.lbl{color:var(--yl)}
input,select,textarea{
  background:var(--sf);border:1px solid var(--bd);border-radius:14px;
  color:var(--tx);font-size:15px;font-weight:600;padding:13px 16px;
  width:100%;outline:none;font-family:inherit;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--mu);font-weight:400}
.btn{padding:15px;border-radius:16px;border:none;cursor:pointer;font-size:14px;
  font-weight:700;font-family:inherit;width:100%;
  display:flex;align-items:center;justify-content:center;gap:8px}
.by{background:var(--yl);color:#000}
.by:disabled{background:var(--dm);color:#666;cursor:default}
.bs{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.bb{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}
.bg2{background:rgba(76,175,80,.12);border:1px solid rgba(76,175,80,.4);color:var(--gn)}
.br{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);color:var(--rd)}
.bo{background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);color:var(--or)}
.bp{background:linear-gradient(135deg,#6A1B9A,#8E24AA);color:#fff}
.diff{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;letter-spacing:.5px}
.de{background:rgba(76,175,80,.15);color:#4CAF50}
.dm2{background:rgba(255,214,0,.15);color:#FFD600}
.dh{background:rgba(255,107,0,.15);color:#FF6B00}
.pt{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--yl),var(--or));transition:width 1s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,.15);
  border-top-color:var(--yl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes dr{to{stroke-dashoffset:0}}
.ra{stroke-dasharray:600;stroke-dashoffset:600;animation:dr 2.2s ease forwards .4s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pu 1.4s infinite}
.chip{padding:7px 13px;border-radius:10px;border:1px solid var(--bd);cursor:pointer;
  font-size:12px;font-weight:700;font-family:inherit;background:var(--dm);color:var(--mu);transition:all .15s}
.chip.on{background:var(--yl);border-color:var(--yl);color:#000}
.mw{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center}
.mw.open{display:flex}
.mbd{position:absolute;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px)}
.msh{position:relative;z-index:1;width:100%;max-width:480px;background:#161B25;
  border-radius:28px 28px 0 0;border-top:1px solid var(--bd);
  padding:0 20px calc(var(--sb) + 20px);
  animation:su .35s cubic-bezier(.34,1.2,.64,1);max-height:92vh;overflow-y:auto}
.msh::-webkit-scrollbar{display:none}
.mh{width:40px;height:4px;border-radius:2px;background:var(--dm);margin:12px auto 20px}
.fab{position:fixed;bottom:calc(90px + var(--sb) + 14px);right:18px;
  width:56px;height:56px;border-radius:18px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  gap:2px;z-index:100;transition:transform .15s}
.fab:active{transform:scale(.91)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:800;color:#000;flex-shrink:0}
.row{display:flex;gap:10px}.row>*{flex:1}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:6px}
.sect{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:12px}
.bk{display:flex;align-items:center;gap:8px;background:none;border:none;
  color:var(--yl);font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;padding:0;margin-bottom:16px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:18px;margin-bottom:14px}
.st2{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:12px}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  background:#1E2535;color:white;padding:12px 20px;border-radius:14px;
  font-size:14px;font-weight:600;opacity:0;pointer-events:none;
  transition:opacity .3s;z-index:999;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1}
/* Objectif ring */
.obj-ring{position:relative;display:flex;align-items:center;
  justify-content:center;margin:0 auto 16px;width:130px;height:130px}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
// DATABASE
// ═══════════════════════════════════════════════════════════
function iDB() {
  return {
    version: 3,
    activeProfile: 'p1',
    apiKey: '',
    apiProvider: 'groq',
    profiles: {
      p1: {
        id:'p1', name:'Lucas', role:'conducteur', color:'#FFD600', ini:'L',
        kmOrigin: 0, kmOriginDate: '', kmCurrent: 425,
        plan: [], sessions: [],
        genZone: 'Paris', genGoal: 'Manœuvres',
        dateNaissance: '2009-07-06',
        objectifKm: 3000,
        datePermis: '',
        skills: {demarrage:0,virages:0,stationnement:0,voie_rapide:0,nuit:0,pluie:0}
      }
    }
  };
}
function lDB() {
  try {
    var d = JSON.parse(localStorage.getItem('dai3_db') || 'null');
    return (d && d.version >= 3) ? d : iDB();
  } catch(e) { return iDB(); }
}
function sDB() { localStorage.setItem('dai3_db', JSON.stringify(DB)); }
var DB = lDB();
function ap() { return DB.profiles[DB.activeProfile]; }
function conds() { return Object.values(DB.profiles).filter(function(p){return p.role==='conducteur';}); }
function accs()  { return Object.values(DB.profiles).filter(function(p){return p.role==='accompagnateur';}); }
function prog(p) {
  var v = Object.values(p.skills||{});
  return v.length ? Math.round(v.reduce(function(a,b){return a+b;},0)/v.length) : 0;
}
function sc(v) { return v>70?'var(--gn)':v>40?'var(--yl)':'var(--or)'; }

// ═══════════════════════════════════════════════════════════
// OBJECTIF CALCUL — cœur de la fonctionnalité
// ═══════════════════════════════════════════════════════════
function calcObj(p) {
  var today = new Date();
  var kmFaits = p.kmCurrent || 0;
  var kmObj   = p.objectifKm || 3000;
  var kmRest  = Math.max(0, kmObj - kmFaits);
  var pct     = Math.min(100, Math.round((kmFaits / kmObj) * 100));

  // Date butoir : 18 ans ou date permis
  var butoir = null;
  if (p.dateNaissance) {
    var dn = new Date(p.dateNaissance);
    butoir = new Date(dn.getFullYear()+18, dn.getMonth(), dn.getDate());
  }
  if (p.datePermis) butoir = new Date(p.datePermis);

  var joursRest = butoir ? Math.max(0, Math.round((butoir - today) / 86400000)) : null;
  var semRest   = joursRest ? Math.ceil(joursRest / 7) : null;
  var kmSem     = (semRest && semRest > 0) ? Math.ceil(kmRest / semRest) : null;
  var kmJour    = (joursRest && joursRest > 0) ? (kmRest / joursRest).toFixed(1) : null;

  // Vitesse actuelle (basée sur sessions)
  var sessions = p.sessions || [];
  var kmSemActuel = 0;
  if (sessions.length >= 2) {
    var firstDate = new Date(sessions[0].date || today);
    var lastDate  = new Date(sessions[sessions.length-1].date || today);
    var jours = Math.max(1, (lastDate - firstDate) / 86400000);
    kmSemActuel = Math.round((kmFaits / jours) * 7);
  } else {
    kmSemActuel = kmSem ? Math.round(kmSem * 0.6) : 0;
  }

  // Alertes
  var retard = kmSem && kmSem > 120;
  var urgent = joursRest && joursRest < 90;

  // Estimation date fin au rythme actuel
  var dateFinEstimee = null;
  if (kmSemActuel > 0) {
    var semainesNecessaires = Math.ceil(kmRest / kmSemActuel);
    dateFinEstimee = new Date(today.getTime() + semainesNecessaires * 7 * 86400000);
  }

  return {
    kmFaits: kmFaits, kmObj: kmObj, kmRest: kmRest, pct: pct,
    butoir: butoir, joursRest: joursRest, semRest: semRest,
    kmSem: kmSem, kmJour: kmJour,
    kmSemActuel: kmSemActuel,
    retard: retard, urgent: urgent,
    dateFinEstimee: dateFinEstimee
  };
}

function fmtDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'});
}

// ═══════════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════════
var TABS = ['home','obj','gen','profils','settings'];
function go(id) {
  TABS.forEach(function(t) {
    document.getElementById('s-'+t).style.display = t===id ? '' : 'none';
    document.getElementById('t-'+t).classList.toggle('active', t===id);
  });
  var fn = {home:rHome, obj:rObj, gen:rGen, profils:rProfils, settings:rSettings}[id];
  if (fn) fn();
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
var DAYS  = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
var DATES = [23,24,25,26,27,28,29];
var DT = [
  {day:'Lun',title:'Quartier résidentiel',distance:'5.2',duration:'25 min',difficulty:'Facile',focus:'Démarrage',icon:'🌅'},
  {day:'Mer',title:'Carrefours centre-ville',distance:'8.4',duration:'40 min',difficulty:'Moyen',focus:'Priorités',icon:'🚦'},
  {day:'Jeu',title:'Parking + créneaux',distance:'3.8',duration:'35 min',difficulty:'Moyen',focus:'Stationnement',icon:'🅿️'},
  {day:'Sam',title:'Première autoroute',distance:'22',duration:'20 min',difficulty:'Difficile',focus:'Voie rapide',icon:'🛣️'},
];
function trips()  { var p=ap(); return(p.plan&&p.plan.length)?p.plan:DT; }
function dc(d)    { return d==='Facile'?'de':d==='Moyen'?'dm2':'dh'; }
function di(d)    { return d==='Facile'?'🌅':d==='Moyen'?'🚦':d==='Difficile'?'🛣️':'🏆'; }
function db(d)    { return d==='Facile'?'rgba(76,175,80,.12)':d==='Moyen'?'rgba(255,214,0,.12)':'rgba(255,107,0,.12)'; }
function glk()    { var p=ap(),s=p.sessions||[]; return s.length?(s[s.length-1].kmApres||0):(p.kmOrigin||0); }
var aDay=3, dDays=[0,1,2];

function mapSVG() {
  return '<svg viewBox="0 0 400 185" style="position:absolute;inset:0;width:100%;height:100%">'
    +'<defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="0">'
    +'<stop offset="0%" stop-color="#FFD600" stop-opacity=".9"/>'
    +'<stop offset="100%" stop-color="#FF6B00" stop-opacity=".9"/>'
    +'</linearGradient></defs>'
    +'<line x1="0" y1="40" x2="400" y2="40" stroke="#1E2535" stroke-width=".5"/>'
    +'<line x1="0" y1="80" x2="400" y2="80" stroke="#1E2535" stroke-width=".5"/>'
    +'<line x1="0" y1="120" x2="400" y2="120" stroke="#1E2535" stroke-width=".5"/>'
    +'<line x1="60" y1="0" x2="60" y2="185" stroke="#1E2535" stroke-width=".5"/>'
    +'<line x1="200" y1="0" x2="200" y2="185" stroke="#1E2535" stroke-width=".5"/>'
    +'<line x1="340" y1="0" x2="340" y2="185" stroke="#1E2535" stroke-width=".5"/>'
    +'<path d="M18 165 Q80 130 155 100 Q225 70 295 82 Q355 92 390 48" stroke="#1E3A5F" stroke-width="11" fill="none" stroke-linecap="round"/>'

function rHome() {
  var p = ap(), t = trips(), today = t[aDay % t.length] || t[0];
  var totalKm = t.reduce(function(s,x){return s+parseFloat(x.distance||0);},0).toFixed(0);
  var pr = prog(p);
  var obj = calcObj(p);
  var cs = conds();

  var switcher = '';
  if (cs.length > 1) {
    var pills = cs.map(function(c) {
      var isA = c.id === DB.activeProfile;
      return '<div onclick="swProf(\''+c.id+'\')" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0">'

  var h = '<div style="padding:0 18px 10px">';

  h += '<div style="font-size:24px;font-weight:900;color:#fff">Bonjour '+p.name+' ›</div></div>';
  h += '<div style="display:flex;gap:8px;align-items:center">';

    var urgColor = obj.urgent ? 'var(--rd)' : obj.retard ? 'var(--or)' : 'var(--gn)';
    h += '<div onclick="go(\'obj\')" style="background:linear-gradient(135deg,#1A0A28,#120A1E);border:1px solid rgba(156,39,176,.4);border-radius:18px;padding:14px 18px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:14px">';
    h += '<div style="flex:1"><div style="font-size:10px;font-weight:700;color:#CE93D8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">🎯 Objectif 3000 km</div>';
    h += '<div style="font-size:13px;font-weight:700;color:#fff">'+obj.kmFaits.toLocaleString('fr')+' / '+obj.kmObj.toLocaleString('fr')+' km <span style="color:var(--mu)">• '+obj.pct+'%</span></div>';
    h += '<div style="font-size:12px;color:'+urgColor+';margin-top:3px">⚡ '+obj.kmSem+' km/semaine requis • '+obj.joursRest+' jours restants</div></div>';
    h += '<div style="font-size:28px;font-weight:900;color:'+urgColor+'">'+obj.kmRest.toLocaleString('fr')+'<div style="font-size:11px;font-weight:400;color:var(--mu)">km restants</div></div></div>';
  }

  // KM Card
  h += '<div onclick="go(\'obj\')" style="background:linear-gradient(135deg,#0A1020,#0D1628);border:1px solid rgba(33,150,243,.3);border-radius:20px;padding:16px 18px;margin-bottom:14px;cursor:pointer">';
  h += '<div style="display:flex;justify-content:space-between"><div>';
  h += '<div style="font-size:10px;font-weight:700;color:#2196F3;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">🚗 Kilométrage</div>';
  h += '<div style="font-size:24px;font-weight:900;color:#fff">'+(p.kmOrigin+p.kmCurrent).toLocaleString('fr')+' <span style="font-size:13px;color:var(--mu)">km</span></div>';
  h += p.kmOrigin>0 ? '<div style="font-size:11px;color:var(--mu);margin-top:2px">Depuis '+p.kmOriginDate+'</div>' : '<div style="font-size:11px;color:var(--yl);margin-top:2px">→ Définir km origine</div>';
  h += '</div><div style="text-align:right"><div style="font-size:11px;color:var(--mu)">Parcouru</div>';
  h += '<div style="font-size:20px;font-weight:800;color:var(--gn)">+'+p.kmCurrent+' km</div>';
  h += '<div style="font-size:10px;color:var(--mu)">'+(p.sessions?p.sessions.length:0)+' leçons</div></div></div></div>';

  // Week strip
  h += '<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none">';
  DAYS.forEach(function(d,i) {
    var isA = i===aDay, done = dDays.indexOf(i)>=0;
    h += '<div onclick="setDay('+i+')" style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 13px;border-radius:16px;cursor:pointer;background:'+(isA?'var(--yl)':'var(--sf)')+';border:1px solid '+(isA?'var(--yl)':'var(--bd)')+';">'
      +'<span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:'+(isA?'#000':'var(--mu)')+'">'+d+'</span>'
      +'<span style="font-size:18px;font-weight:800;color:'+(isA?'#000':'#fff')+'">'+DATES[i]+'</span>'
      +'<span style="width:5px;height:5px;border-radius:50%;background:'+(done?'var(--gn)':isA?'#000':'var(--dm)')+'"></span>'
      +'</div>';
  });
  h += '</div>';

  // Map card
  h += '<div style="position:relative;height:185px;border-radius:22px;overflow:hidden;background:#0E1620;border:1px solid var(--bd);margin-bottom:14px">';
  h += '<div style="position:absolute;inset:0;background:linear-gradient(135deg,#0E1620,#0A1628)"></div>'+mapSVG();
  h += '<div style="position:absolute;top:12px;left:12px;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);border:1px solid rgba(255,214,0,.3);border-radius:12px;padding:6px 12px"><div style="font-size:9px;color:var(--yl);font-weight:700;letter-spacing:1px;text-transform:uppercase">Durée</div><div style="font-size:17px;font-weight:800;color:#fff">'+(today.duration||'—')+'</div></div>';
  h += '<div style="position:absolute;top:12px;right:12px;background:linear-gradient(135deg,rgba(255,214,0,.12),rgba(255,107,0,.12));border:1px solid rgba(255,214,0,.4);border-radius:12px;padding:6px 10px;display:flex;align-items:center;gap:6px"><div class="pulse" style="width:6px;height:6px;border-radius:50%;background:var(--yl)"></div><span style="font-size:10px;font-weight:700;color:var(--yl)">IA Généré</span></div>';
  h += '<div style="position:absolute;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(0,rgba(13,17,23,.96),transparent);display:flex;justify-content:space-between;align-items:flex-end">';
  h += '<div><div style="font-size:13px;font-weight:700;color:#fff">'+(today.title||'—')+'</div><div style="font-size:11px;color:var(--mu);margin-top:2px">'+(today.focus||'')+' · '+(today.distance||'?')+' km</div></div>';
  h += '<button onclick="oNav(\''+(today.title||'').replace(/'/g,'')+'\')" style="background:var(--yl);color:#000;font-size:12px;font-weight:800;padding:8px 14px;border-radius:12px;border:none;cursor:pointer">▶ Naviguer</button></div></div>';

  // Stats row
  h += '<div class="row" style="margin-bottom:14px">';
  h += '<div style="flex:1;background:linear-gradient(135deg,#1A1500,#1F1A00);border:1px solid rgba(255,214,0,.25);border-radius:18px;padding:14px"><div style="font-size:18px;margin-bottom:4px">⚡</div><div style="font-size:26px;font-weight:900;color:var(--yl);line-height:1">'+pr+'<span style="font-size:13px;font-weight:400;color:var(--mu)">%</span></div><div style="font-size:11px;color:var(--mu);margin-top:2px">Compétences</div></div>';
  h += '<div style="flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:14px"><div style="font-size:18px;margin-bottom:4px">🛣️</div><div style="font-size:26px;font-weight:900;color:#fff;line-height:1">'+totalKm+'<span style="font-size:13px;font-weight:400;color:var(--mu)"> km</span></div><div style="font-size:11px;color:var(--mu);margin-top:2px">Plan semaine</div></div>';
  h += '<div style="flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:14px"><div style="font-size:18px;margin-bottom:4px">🎯</div><div style="font-size:26px;font-weight:900;color:#fff;line-height:1">'+dDays.length+'<span style="font-size:13px;font-weight:400;color:var(--mu)">/'+(trips().length)+'</span></div><div style="font-size:11px;color:var(--mu);margin-top:2px">Faits</div></div>';
  h += '</div>';

  // Trips
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h += '<span class="sect" style="margin:0">'+(ap().plan&&ap().plan.length?'Plan IA · Sem. 27':'Trajets du plan')+'</span>';
  h += '<span onclick="go(\'gen\')" style="font-size:12px;color:var(--yl);font-weight:600;cursor:pointer">Régénérer</span></div>';
  trips().forEach(function(tr,i){h+=tCard(tr,i);});

  // CTA
  h += '<div onclick="go(\'gen\')" style="background:linear-gradient(135deg,#1A1500,#1F1A00);border:1px solid rgba(255,214,0,.35);border-radius:20px;padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-top:4px">';
  h += '<div style="width:48px;height:48px;background:linear-gradient(135deg,var(--yl),var(--or));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🧠</div>';
  h += '<div style="flex:1"><div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:2px">Générer ma semaine IA</div><div style="font-size:11px;color:var(--mu)">Trajets sur-mesure selon ton niveau</div></div>';
  h += '<span style="color:var(--yl);font-size:22px">›</span></div></div>';

  document.getElementById('s-home').innerHTML = h;
}
function setDay(i) { aDay=i; rHome(); }

// ═══════════════════════════════════════════════════════════
// OBJECTIF SCREEN

function rObj() {
  var p = ap();
  var obj = calcObj(p);
  var urgColor = obj.urgent ? 'var(--rd)' : obj.retard ? 'var(--or)' : 'var(--gn)';

  // SVG ring
  var circ = 2 * Math.PI * 54; // r=54
  var offset = circ - (obj.pct/100) * circ;
  var ringColor = obj.urgent ? '#F44336' : obj.retard ? '#FF6B00' : '#9C27B0';

  var h = '<div style="padding:0 18px 10px">';
  h += '<button class="bk" onclick="go(\'home\')">← Accueil</button>';
  h += '<div style="font-size:26px;font-weight:900;color:#fff;margin-bottom:20px">🎯 Objectif AAC</div>';

  // Config card
  h += '<div style="background:linear-gradient(135deg,#1A0A28,#120A1E);border:1px solid rgba(156,39,176,.4);border-radius:22px;padding:20px;margin-bottom:16px">';
  h += '<div style="font-size:11px;font-weight:700;color:#CE93D8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px">⚙️ Configuration</div>';

  h += '<div class="row" style="margin-bottom:12px">';
  h += '<div><div class="lbl">Date de naissance</div><input type="date" id="dn" value="'+(p.dateNaissance||'')+'" onchange="saveObjConfig()"></div>';
  h += '<div><div class="lbl">Objectif km total</div><input type="number" id="okm" value="'+(p.objectifKm||3000)+'" onchange="saveObjConfig()"></div>';
  h += '</div>';
  h += '<div class="lbl">Km parcourus à ce jour</div>';
  h += '<input type="number" id="okmc" value="'+(p.kmCurrent||0)+'" onchange="saveObjConfig()" style="margin-bottom:12px">';
  h += '<div class="lbl">Km au compteur (origine)</div>';
  h += '<div class="row" style="margin-bottom:12px">';
  h += '<div><input type="number" id="okor" value="'+(p.kmOrigin||0)+'" onchange="saveObjConfig()" placeholder="ex: 12500"></div>';
  h += '<div><div class="lbl" style="margin-top:0">Date départ</div><input type="date" id="okod" value="'+(p.kmOriginDate||'')+'" onchange="saveObjConfig()"></div>';
  h += '</div>';
  h += '<button class="btn by" onclick="saveObjConfig()" style="padding:12px;font-size:13px">💾 Enregistrer</button></div>';

  // Big progress ring
  h += '<div style="background:linear-gradient(135deg,#1A0A28,#120A1E);border:1px solid rgba(156,39,176,.4);border-radius:22px;padding:24px;margin-bottom:16px;text-align:center">';
  h += '<svg viewBox="0 0 120 120" style="width:130px;height:130px;margin:0 auto 16px;display:block">';
  h += '<defs><linearGradient id="rring" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9C27B0"/><stop offset="100%" stop-color="#CE93D8"/></linearGradient></defs>';
  h += '<circle cx="60" cy="60" r="54" fill="none" stroke="#2A1A3A" stroke-width="10"/>';
  h += '<circle cx="60" cy="60" r="54" fill="none" stroke="'+ringColor+'" stroke-width="10" stroke-linecap="round"';
  h += ' stroke-dasharray="'+circ.toFixed(0)+'" stroke-dashoffset="'+offset.toFixed(0)+'"';
  h += ' transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s ease"/>';
  h += '<text x="60" y="55" text-anchor="middle" fill="white" font-size="22" font-weight="900" font-family="system-ui">'+obj.pct+'%</text>';
  h += '<text x="60" y="72" text-anchor="middle" fill="#8B95A1" font-size="10" font-family="system-ui">'+obj.kmFaits.toLocaleString('fr')+' km</text>';
  h += '</svg>';

  h += '<div style="font-size:32px;font-weight:900;color:'+urgColor+'">'+obj.kmRest.toLocaleString('fr')+' km</div>';
  h += '<div style="font-size:14px;color:var(--mu);margin-top:4px">restants sur '+obj.kmObj.toLocaleString('fr')+' km</div>';

  if (obj.butoir) {
    h += '<div style="display:inline-flex;align-items:center;gap:8px;background:rgba(156,39,176,.12);border:1px solid rgba(156,39,176,.3);border-radius:12px;padding:8px 16px;margin-top:12px">';
    h += '<span style="font-size:14px">🎂</span>';
    h += '<span style="font-size:13px;font-weight:700;color:#fff">18 ans le '+fmtDate(obj.butoir)+'</span></div>';
  }
  h += '</div>';

  // Planning adaptatif
  if (obj.kmSem !== null) {
    h += '<div style="background:linear-gradient(135deg,#0A1A10,#0D2010);border:1px solid rgba(76,175,80,.4);border-radius:22px;padding:20px;margin-bottom:16px">';
    h += '<div style="font-size:11px;font-weight:700;color:var(--gn);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px">📅 Planning adaptatif</div>';

    // Stats grid
    h += '<div class="row" style="margin-bottom:14px">';
    h += '<div style="background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.25);border-radius:14px;padding:12px;text-align:center">';

    h += '<div style="background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.25);border-radius:14px;padding:12px;text-align:center">';
    h += '<div style="font-size:24px;font-weight:900;color:var(--yl)">'+obj.semRest+'</div>';
    h += '<div style="font-size:11px;color:var(--mu)">semaines restantes</div></div>';
    h += '</div>';

    h += '<div class="row" style="margin-bottom:14px">';
    h += '<div style="background:rgba(33,150,243,.1);border:1px solid rgba(33,150,243,.25);border-radius:14px;padding:12px;text-align:center">';
    h += '<div style="font-size:24px;font-weight:900;color:#64B5F6">'+obj.kmJour+'</div>';
    h += '<div style="font-size:11px;color:var(--mu)">km/jour requis</div></div>';
    h += '<div style="background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.25);border-radius:14px;padding:12px;text-align:center">';
    h += '<div style="font-size:24px;font-weight:900;color:var(--or)">'+obj.kmSemActuel+'</div>';
    h += '<div style="font-size:11px;color:var(--mu)">km/sem actuel</div></div>';
    h += '</div>';

    // Alerte
    if (obj.retard || obj.urgent) {
      h += '<div style="background:rgba('+( obj.urgent?'244,67,54':'255,107,0' )+',.1);border:1px solid rgba('+(obj.urgent?'244,67,54':'255,107,0')+',.3);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start">';

      h += '<div style="font-size:12px;color:var(--mu);line-height:1.6">';
      if (obj.urgent) h += 'Moins de 90 jours ! Il faut '+obj.kmSem+' km/semaine. ';
      else h += 'Le rythme actuel ('+obj.kmSemActuel+' km/sem) est insuffisant. ';
      h += 'Cible : '+obj.kmSem+' km/sem avec '+obj.joursRest+' jours restants.</div></div></div>';
    } else {
      h += '<div style="background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.3);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:center">';
      h += '<span style="font-size:22px">✅</span>';
      h += '<div><div style="font-size:14px;font-weight:700;color:#fff">Rythme bon !</div>';
      h += '<div style="font-size:12px;color:var(--mu)">'+obj.kmSem+' km/sem nécessaires · '+obj.joursRest+' jours restants</div></div></div>';
    }

    // Estimation date fin
    if (obj.dateFinEstimee) {
      h += '<div style="background:rgba(33,150,243,.08);border:1px solid rgba(33,150,243,.2);border-radius:14px;padding:14px;margin-bottom:14px">';
      h += '<div style="font-size:12px;color:var(--mu);margin-bottom:4px">📆 Au rythme actuel ('+obj.kmSemActuel+' km/sem), objectif atteint le :</div>';
      h += '<div style="font-size:18px;font-weight:800;color:#64B5F6">'+fmtDate(obj.dateFinEstimee)+'</div>';
      if (obj.butoir && obj.dateFinEstimee > obj.butoir) {
        h += '<div style="font-size:12px;color:var(--rd);margin-top:4px">⚠️ '+Math.round((obj.dateFinEstimee-obj.butoir)/86400000)+' jours APRÈS les 18 ans — accélérer !</div>';

function sessHTML(p) {

  if (!s.length) return '<div style="font-size:13px;color:var(--mu);text-align:center;padding:20px">Aucune leçon enregistrée</div>';
  return [].concat(s).reverse().map(function(sess, ri) {
    var idx = s.length-1-ri;
    var acc = sess.accId && DB.profiles[sess.accId] ? DB.profiles[sess.accId] : null;
    return '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:8px;background:var(--sf);border:1px solid var(--bd);border-radius:16px">'

      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:#fff">'+(sess.date||'?')+(sess.dur?' · '+sess.dur:'')+'</div>'
      +'<div style="font-size:11px;color:var(--mu);margin-top:1px">'+((sess.types||[]).join(' '))+(sess.note?' · '+sess.note:'')+'</div>'
      +(acc?'<div style="font-size:11px;margin-top:1px">Acc: <span style="color:'+acc.color+'">'+acc.name+'</span></div>':'')

      +'<div style="font-size:15px;font-weight:800;color:var(--gn)">+'+(sess.kmLecon?sess.kmLecon.toFixed(1):'?')+' km</div>'
      +'<button onclick="delSess(\''+p.id+'\','+idx+')" style="font-size:10px;font-weight:700;color:var(--or);background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.25);border-radius:8px;padding:3px 8px;cursor:pointer;font-family:inherit">🗑</button>'

function delSess(pid, idx) {
  if (!confirm('Supprimer cette leçon ?')) return;
  var p = DB.profiles[pid]; p.sessions.splice(idx, 1);
  if (p.sessions.length) { var last=p.sessions[p.sessions.length-1]; p.kmCurrent=Math.max(0,(last.kmApres||0)-p.kmOrigin); }
  sDB(); showToast('Session supprimée'); rObj(); rHome();
}
function clearSess() {
  if (!confirm('Effacer toutes les sessions de '+ap().name+' ?')) return;
  ap().sessions=[]; ap().kmCurrent=0; sDB(); showToast('Historique effacé'); rObj(); rHome();
}

function valPlan(){sDB();showToast('✅ Plan validé !');go('home');}

async function doGen(){
  var p=ap();
  var zone=document.getElementById('g-zone')?.value||'Paris';
  var goal=document.getElementById('g-goal')?.value||'Conduite';
  var selDays=Array.from(document.querySelectorAll('[data-day].on')).map(function(b){return b.dataset.day;});
  var dur=(document.querySelector('[data-dur].on')||{dataset:{dur:'45 min'}}).dataset.dur;
  if(!selDays.length){showToast('Sélectionne au moins un jour');return;}
  if(!DB.apiKey){showToast('Clé API manquante');go('settings');return;}
  p.genZone=zone;p.genGoal=goal;
  var obj=calcObj(p);
  var kmSemInfo=obj.kmSem?'Objectif: '+obj.kmSem+' km cette semaine ('+obj.kmRest.toLocaleString('fr')+' km restants sur '+obj.kmObj+'km avant les 18 ans). ':'' ;
  gLoading=true;gError='';rGen();

  var prompt='Tu es moniteur auto-école expert en AAC. Génère un planning pour '+p.name+'.\n'
    +'Zone: '+zone+' | Objectif élève: '+goal+' | Jours: '+selDays.join(', ')+' | Durée: '+dur+'\n'
    +kmSemInfo
    +'Niveau: débutant-intermédiaire. Difficulté progressant dans la semaine.\n'
    +'Réponds UNIQUEMENT en JSON valide:\n'
    +'{"plan":[{"day":"Lundi","title":"Titre court","distance":"X km","duration":"'+dur+'","difficulty":"Facile|Moyen|Difficile|Défi","focus":"Compétence","icon":"emoji","description":"1 phrase"}]}';

  try {
    var res, data, text, parsed;
    if(DB.apiProvider==='groq'){
      res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+DB.apiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
      data=await res.json();
      if(data.error)throw new Error(data.error.message||'Erreur Groq');
      text=data.choices?.[0]?.message?.content||'';
    }else{
      res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':DB.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
      data=await res.json();
      if(data.error)throw new Error(data.error.message||'Erreur API');
      text=(data.content||[]).map(function(c){return c.text||'';}).join('');
    }
    parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    p.plan=parsed.plan||[];
    gLoading=false;sDB();rGen();showToast('🧠 Plan généré !');
  }catch(e){gLoading=false;gError='Erreur: '+e.message;rGen();}
}

    var k=kv[0],v=kv[1];

    h+='<input type="range" min="0" max="100" value="'+v+'" data-skill="'+k+'" style="width:100%;accent-color:var(--yl)" oninput="var el=document.getElementById(\'sv-'+k+'\');el.textContent=this.value+\'%\';el.style.color=this.value>70?\'var(--gn)\':this.value>40?\'var(--yl)\':\'var(--or)\';"></div>';
  });
  h+='<button class="btn by" onclick="saveSkills(\''+pid+'\')" style="margin-top:8px">✅ Enregistrer</button>';

}
function saveSkills(pid){
  var p=DB.profiles[pid];
  document.querySelectorAll('[data-skill]').forEach(function(inp){p.skills[inp.dataset.skill]=parseInt(inp.value);});
  sDB();cm('m-nav');showToast('✅ Progression mise à jour');rProfils();rHome();
}
var npC='#FFD600',npI='L',npR='conducteur',editId=null;
function openAddProf(role){editId=null;npR=role;npC='#FFD600';npI='L';document.getElementById('mp-t').textContent='Nouveau profil';document.getElementById('mp-s').textContent=role==='conducteur'?'Élève conducteur AAC':'Accompagnateur';document.getElementById('mp-n').value='';document.getElementById('mp-sv').textContent='Créer';setRole(role);om('m-profil');}
function editProf(id){editId=id;var p=DB.profiles[id];npR=p.role;npC=p.color;npI=p.ini;document.getElementById('mp-t').textContent='Modifier '+p.name;document.getElementById('mp-s').textContent='';document.getElementById('mp-n').value=p.name;document.getElementById('mp-sv').textContent='Enregistrer';setRole(p.role);om('m-profil');}
function setRole(r){npR=r;['r-c','r-a'].forEach(function(id){document.getElementById(id).className='btn '+(id==='r-c'&&r==='conducteur'||id==='r-a'&&r==='accompagnateur'?'by':'bs');document.getElementById(id).style.cssText='font-size:13px;padding:12px';});}
function pc(c,i){npC=c;npI=i;document.querySelectorAll('#mp-col .av').forEach(function(a){a.style.outline='none';});event.target.closest('.av').style.outline='3px solid white';}
function saveProf(){
  var name=document.getElementById('mp-n').value.trim();if(!name){showToast('Entre un prénom');return;}
  if(editId){var p=DB.profiles[editId];p.name=name;p.role=npR;p.color=npC;p.ini=name.charAt(0).toUpperCase();showToast('Profil mis à jour');}
  else{var id='p'+Date.now();DB.profiles[id]={id:id,name:name,role:npR,color:npC,ini:name.charAt(0).toUpperCase(),kmOrigin:0,kmOriginDate:'',kmCurrent:0,plan:[],sessions:[],genZone:'Paris',genGoal:'Conduite',dateNaissance:'',objectifKm:3000,datePermis:'',skills:{demarrage:0,virages:0,stationnement:0,voie_rapide:0,nuit:0,pluie:0}};if(npR==='conducteur')DB.activeProfile=id;showToast('Profil '+name+' créé !');}
  sDB();cm('m-profil');rProfils();rHome();
}
function delProf(id){if(!confirm('Supprimer ce profil ?'))return;delete DB.profiles[id];if(DB.activeProfile===id)DB.activeProfile=Object.keys(DB.profiles)[0];sDB();rProfils();rHome();showToast('Profil supprimé');}

// ═══════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════
function rSettings(){
  var p=ap();
  var h='<div style="padding:0 18px 10px">';
  h+='<button class="bk" onclick="go(\'home\')">← Accueil</button>';
  h+='<div style="font-size:26px;font-weight:900;color:#fff;margin-bottom:20px">⚙️ Réglages</div>';
  h+='<div class="sc"><div class="st2">🔑 Clé API IA</div>';
  h+='<div class="lbl">Fournisseur</div>';
  h+='<div class="row" style="margin-bottom:14px"><button onclick="setP(\'groq\')" id="pg" class="btn '+(DB.apiProvider==='groq'?'by':'bs')+'" style="font-size:13px;padding:12px">Groq (gratuit)</button><button onclick="setP(\'anthropic\')" id="pa" class="btn '+(DB.apiProvider==='anthropic'?'by':'bs')+'" style="font-size:13px;padding:12px">Anthropic</button></div>';
  h+='<div class="lbl">Clé ('+(DB.apiProvider==='groq'?'gsk_...':'sk-ant-...')+')</div>';
  h+='<div style="position:relative;margin-bottom:12px"><input type="password" id="ak" value="'+(DB.apiKey||'')+'" placeholder="'+(DB.apiProvider==='groq'?'gsk_...':'sk-ant-...')+'" style="padding-right:50px"><button onclick="var i=document.getElementById(\'ak\');i.type=i.type===\'password\'?\'text\':\'password\';" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px">👁</button></div>';
  h+='<div class="row"><button class="btn by" onclick="saveKey()">Enregistrer</button><button class="btn bs" onclick="testKey()">Tester</button></div>';
  h+='<div id="ks"></div>';
  if(DB.apiProvider==='groq')h+='<div style="background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.2);border-radius:12px;padding:12px;margin-top:12px;font-size:12px;color:var(--mu);line-height:1.7"><strong style="color:#fff">Groq — 100% gratuit</strong><br>1. console.groq.com → créer compte<br>2. API Keys → Create Key → nommer "DriveAI"<br>3. Copier gsk_... et coller ici<br><strong style="color:var(--gn)">14 400 requêtes/jour offertes</strong></div>';
  h+='</div>';
  h+='<div class="sc"><div class="st2">🔄 Remise à zéro</div>';
  h+='<div style="font-size:12px;color:var(--mu);margin-bottom:14px">RAZ progression d\'un conducteur ou toute l\'app.</div>';
  h+='<div class="row"><button class="btn bo" onclick="razProf()" style="font-size:13px;padding:12px">RAZ '+p.name+'</button><button class="btn br" onclick="razAll()" style="font-size:13px;padding:12px">RAZ Tout</button></div></div>';
  h+='<div style="text-align:center;padding:20px 0;font-size:11px;color:var(--dm)">DriveAI v3.0 · Groq Llama 3.3 · Objectif AAC</div></div>';
  document.getElementById('s-settings').innerHTML=h;
}
function setP(p){DB.apiProvider=p;sDB();rSettings();}
function saveKey(){var key=document.getElementById('ak')?.value.trim()||'';DB.apiKey=key;sDB();document.getElementById('ks').innerHTML=key?'<div style="background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.3);border-radius:10px;padding:10px;margin-top:10px;font-size:13px;color:var(--gn)">✅ Clé enregistrée sur cet iPhone</div>':'';showToast('Clé enregistrée');}
async function testKey(){
  if(!DB.apiKey){showToast('Saisis une clé');return;}
  var st=document.getElementById('ks');
  st.innerHTML='<div style="background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.2);border-radius:10px;padding:10px;margin-top:10px;font-size:13px;color:var(--yl);display:flex;align-items:center;gap:8px"><span class="sp"></span>Test en cours…</div>';
  try{
    var ok=false;
    if(DB.apiProvider==='groq'){var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+DB.apiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:5,messages:[{role:'user',content:'OK'}]})});var d=await r.json();ok=!!(d.choices&&d.choices[0]);}
    else{var r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':DB.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:5,messages:[{role:'user',content:'OK'}]})});var d2=await r2.json();ok=!!(d2.content&&d2.content[0]);}
    st.innerHTML=ok?'<div style="background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.3);border-radius:10px;padding:10px;margin-top:10px;font-size:13px;color:var(--gn)">✅ Connexion réussie — IA prête !</div>':'<div style="background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);border-radius:10px;padding:10px;margin-top:10px;font-size:13px;color:var(--or)">❌ Clé invalide</div>';
  }catch(e){st.innerHTML='<div style="background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);border-radius:10px;padding:10px;margin-top:10px;font-size:13px;color:var(--or)">❌ '+e.message+'</div>';}
}
function razProf(){if(!confirm('RAZ de '+ap().name+' ?'))return;var p=ap();p.sessions=[];p.kmCurrent=0;p.plan=[];Object.keys(p.skills||{}).forEach(function(k){p.skills[k]=0;});sDB();showToast('Remis à zéro');rSettings();rHome();}
function razAll(){if(!confirm('Effacer TOUTES les données ?'))return;Object.values(DB.profiles).forEach(function(p){p.sessions=[];p.kmCurrent=0;p.plan=[];Object.keys(p.skills||{}).forEach(function(k){p.skills[k]=0;});});sDB();showToast('RAZ globale effectuée');rSettings();rHome();}

// ═══════════════════════════════════════════════════════════
// EXPORT / IMPORT / SHARE
// ═══════════════════════════════════════════════════════════
function exportJSON(){
  var data=JSON.parse(JSON.stringify(DB));data.exportDate=new Date().toISOString();
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='DriveAI-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  showToast('⬇ JSON téléchargé dans Fichiers');
}
function importJSON(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){doImport(ev.target.result);};r.readAsText(file);};
  inp.click();
}
function importTxt(){var txt=document.getElementById('imp-txt')?.value||'';doImport(txt);cm('m-import');}
function doImport(txt){
  try{
    var data=JSON.parse(txt);if(!data.version)throw new Error('Format invalide');
    var key=DB.apiKey,prov=DB.apiProvider;
    DB=data;DB.apiKey=data.apiKey||key;DB.apiProvider=data.apiProvider||prov;
    sDB();
    var nb=Object.values(data.profiles||{}).reduce(function(s,p){return s+(p.sessions||[]).length;},0);
    showToast('✅ Import · '+nb+' leçons · '+Object.keys(data.profiles||{}).length+' profils');
    go('home');
  }catch(e){showToast('❌ JSON invalide: '+e.message);}
}
function shareJSON(){
  var data=JSON.parse(JSON.stringify(DB));data.exportDate=new Date().toISOString();
  var json=JSON.stringify(data,null,2);
  if(navigator.share){
    var blob=new Blob([json],{type:'application/json'});
    var file=new File([blob],'DriveAI-'+new Date().toISOString().split('T')[0]+'.json',{type:'application/json'});
    navigator.share({files:[file],title:'DriveAI Progression'}).catch(function(){copyClip(json);});
  }else{copyClip(json);}
}
function copyClip(txt){navigator.clipboard.writeText(txt).then(function(){showToast('📋 JSON copié');}).catch(function(){showToast('Copie non supportée');});}

// LECON MODAL
// ═══════════════════════════════════════════════════════════
function openLecon(){
  var p=ap();document.getElementById('lw').textContent=p.name+' · Coach AAC';
  document.getElementById('l-date').value=new Date().toISOString().split('T')[0];
  ['l-km','l-note','l-dur'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  document.querySelectorAll('#l-chips .chip').forEach(function(c,i){c.classList.toggle('on',i===0);});
  var sel=document.getElementById('l-acc');
  sel.innerHTML='<option value="">— Aucun accompagnateur —</option>'+accs().map(function(a){return '<option value="'+a.id+'">'+a.name+'</option>';}).join('');
  rLeconHist();updateDelta();om('m-lecon');
}
function updateDelta(){
  var val=parseFloat(document.getElementById('l-km')?.value||0);
  var delta=document.getElementById('l-delta');if(!delta)return;
  var last=glk(),p=ap();
  if(val>0&&last>0&&val>last){delta.textContent='+'+( val-last).toFixed(1)+' km · Précédent: '+last.toLocaleString('fr')+' km';delta.style.color='var(--gn)';}
  else if(val>0&&p.kmOrigin>0){delta.textContent='+'+( val-p.kmOrigin).toFixed(1)+' km depuis le départ';delta.style.color='var(--yl)';}
  else delta.textContent='';
}
function saveLecon(){
  var km=parseFloat(document.getElementById('l-km')?.value||0);
  if(!km||km<=0){showToast('Saisis le km compteur');return;}
  var p=ap(),last=glk();
  var sess={kmApres:km,kmLecon:Math.max(0,km-last),date:document.getElementById('l-date')?.value||'',dur:document.getElementById('l-dur')?.value||'',note:document.getElementById('l-note')?.value||'',types:Array.from(document.querySelectorAll('#l-chips .chip.on')).map(function(c){return c.textContent.trim();}),accId:document.getElementById('l-acc')?.value||''};
  if(!p.sessions)p.sessions=[];p.sessions.push(sess);p.kmCurrent=Math.max(0,km-p.kmOrigin);
  sDB();showToast('✅ Leçon +'+sess.kmLecon.toFixed(1)+' km');rLeconHist();rHome();
}
function rLeconHist(){
  var block=document.getElementById('l-hist');if(!block)return;
  var s=ap().sessions||[];if(!s.length){block.innerHTML='';return;}
  var h='<div style="font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">3 dernières leçons</div>';
  [].concat(s).slice(-3).reverse().forEach(function(sess,ri){
    var idx=s.length-1-ri;
    h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)">🚗<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">'+(sess.date||'?')+(sess.dur?' · '+sess.dur:'')+'</div><div style="font-size:11px;color:var(--mu)">'+((sess.types||[]).join(' '))+'</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:800;color:var(--gn)">+'+(sess.kmLecon?sess.kmLecon.toFixed(1):'?')+' km</div><button onclick="delSess(\''+ap().id+'\','+idx+');rLeconHist();" style="font-size:10px;color:var(--or);background:none;border:none;cursor:pointer;font-family:inherit">🗑</button></div></div>';
  });
  block.innerHTML=h;
}

  h+='<div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#34C759,#30D158);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">🗺️</div>';

}

// MODAL & TOAST

function om(id){document.getElementById(id).classList.add('open');}

rHome();
